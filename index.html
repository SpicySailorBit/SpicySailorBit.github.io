<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planer Trasy Kuriera</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Usuwamy domyślne marginesy i rozciągamy mapę na całe okno */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Inicjalizacja mapy: ustawiamy środek na Polskę i przybliżenie (zoom) na 6
        const map = L.map('map').setView([51.9194, 19.1451], 6);

        // 2. Pobranie darmowych kafelków (wyglądu) z OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Dodanie testowego znacznika na mapie
        L.marker([51.9194, 19.1451]).addTo(map)
            .bindPopup('Witaj w Twojej nowej aplikacji kurierskiej!')
            .openPopup();
    </script>
</body>
</html>

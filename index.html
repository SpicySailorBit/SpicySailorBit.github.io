<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planer Trasy Kuriera</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; overflow: hidden; background: #f8f9fa; }
        
        /* ZMIANA: Czysty kontener mapy, bez nakładania zbędnych warstw */
        #map { 
            width: 150vmax; height: 150vmax; z-index: 1; 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) rotate(0deg);
            touch-action: none; 
            overscroll-behavior: none;
            will-change: transform;
        }
        
        #ui-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            width: 320px; max-width: 90vw; display: flex; flex-direction: column;
            max-height: 90vh; 
        }
        
        #ui-header {
            background-color: #343a40; color: white; padding: 15px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 16px; position: sticky; top: 0; z-index: 2;
        }
        
        #ui-panel:not(.collapsed) #ui-header { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        
        #ui-content { padding: 15px; overflow-y: auto; max-height: calc(90vh - 50px); }
        .scroll-buffer { height: 40px; } 
        .hidden { display: none !important; }
        
        input[type="text"], select { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;}
        
        button { width: 100%; padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-primary { background-color: #007bff; } .btn-primary:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; } .btn-success:hover { background-color: #218838; }
        .btn-warning { background-color: #ffc107; color: #212529; } .btn-warning:hover { background-color: #e0a800; }
        .btn-danger { background-color: #dc3545; } .btn-danger:hover { background-color: #c82333; }
        .btn-info { background-color: #17a2b8; } .btn-info:hover { background-color: #138496; }
        .btn-secondary { background-color: #6c757d; } .btn-secondary:hover { background-color: #5a6268; }
        
        #points-list { margin-top: 10px; padding-left: 20px; font-size: 14px; max-height: 180px; overflow-y: auto; }
        hr { border: 0; height: 1px; background: #ddd; margin: 15px 0; }

        .custom-marker {
            background-color: #007bff; color: white; border-radius: 50%;
            text-align: center; line-height: 28px; font-size: 14px;
            font-weight: bold; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .custom-marker.zaliczony { background-color: #dc3545; } 
        .custom-marker.pozniej { background-color: #ffc107; color: #212529; } 
        .custom-marker.priorytet { background-color: #fd7e14; border-color: #343a40; z-index: 1000 !important; }

        .group-details { background: #f1f3f5; padding: 5px; border-radius: 4px; border: 1px solid #dee2e6; margin-bottom: 8px; }
        .group-summary { font-weight: bold; cursor: pointer; outline: none; display: flex; justify-content: space-between; align-items: center; padding: 5px; font-size: 14px; }
        .group-summary-text { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 5px; }
        .group-actions, .item-actions { display: flex; gap: 8px; font-size: 14px; align-items: center; }
        .action-edit { color: #007bff; cursor: pointer; font-weight: bold; }
        .action-delete { color: #dc3545; cursor: pointer; font-weight: bold; }
        
        #saved-groups-container { max-height: 220px; overflow-y: auto; margin-top: 10px; margin-bottom: 10px; }
        .saved-item-list { list-style: none; padding-left: 5px; margin: 5px 0 0 0; border-top: 1px dashed #ccc; padding-top: 5px; }
        .saved-item { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 6px; background: white; padding: 6px; border-radius: 4px; border: 1px solid #eee;}
        .saved-item span.name { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @keyframes pulseAlert {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 193, 7, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 193, 7, 0); }
        }
        
        #proximity-alert {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: #ffc107; color: #212529; padding: 10px 14px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid white;
            font-weight: bold; font-size: 13px; cursor: pointer; text-align: center;
            animation: pulseAlert 2s infinite; white-space: nowrap;
            transition: bottom 0.3s ease-in-out; 
            max-width: 50vw; overflow: hidden; text-overflow: ellipsis;
        }
        #proximity-alert:hover { background: #e0a800; }
        #proximity-alert.lifted { bottom: 100px !important; }

        #center-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background-color: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 25px;
            font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            width: auto; margin-bottom: 0; display: inline-block;
        }
        #center-btn:hover { background-color: #0056b3; }
        
        #route-stats {
            background: #e9ecef; padding: 10px; border-radius: 4px; margin-bottom: 10px;
            font-weight: bold; font-size: 14px; text-align: center;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 2000; 
            display: flex; justify-content: center; align-items: center;
        }
        .modal-box {
            background: white; padding: 20px; border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 340px; max-width: 90vw;
        }
        
        #edit-modal h3 { margin-top: 0; margin-bottom: 15px; color: #343a40; }
        #edit-modal label { font-size: 13px; font-weight: bold; color: #495057; display: block; margin-bottom: 5px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-buttons button { margin-bottom: 0; }

        #action-modal { text-align: center; }
        #action-modal h3 { margin-top: 0; color: #343a40; margin-bottom: 5px; }
        #action-modal-address { font-size: 16px; font-weight: bold; color: #007bff; margin-bottom: 20px; word-wrap: break-word; }
        #action-modal button { font-size: 16px; padding: 15px; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div id="ui-header" onclick="togglePanel()">
            <span>Menu Trasy</span>
            <span id="toggle-icon">▼</span>
        </div>
        
        <div id="ui-content">
            <input type="text" id="address-input" placeholder="np. Wawel 5, Kraków">
            <button class="btn-primary" onclick="addAddress()">➕ Dodaj do trasy</button>
            
            <details id="permanent-section">
                <summary style="font-weight: bold; cursor: pointer; margin-bottom: 5px;">📂 Stałe adresy (Zapisane)</summary>
                <div style="margin-top: 10px;">
                    <button class="btn-info" style="background-color: #20c997; padding: 6px; font-size: 13px;" onclick="createNewGroup()">📁 + Nowa grupa</button>
                    <label style="font-size: 12px; font-weight: bold; color: #555;">Wybierz grupę zapisu:</label>
                    <select id="saved-group-select"></select>
                    <input type="text" id="saved-address-input" placeholder="Dodaj nowy stały adres">
                    <button class="btn-info" onclick="savePermanentAddress()">💾 Zapisz w stałych</button>
                    <div id="saved-groups-container"></div>
                    <button class="btn-success" style="margin-bottom: 0;" onclick="addSelectedSaved()">✔️ Dodaj zaznaczone</button>
                </div>
            </details>
            
            <div id="route-stats" class="hidden"></div>
            <hr>
            <button id="track-btn" class="btn-success" style="background-color: #28a745; padding: 12px; font-size: 16px;" onclick="toggleDriveMode()">🚀 Wyruszam!</button>
            
            <h4 style="margin-bottom: 5px; margin-top: 10px;">Lista punktów:</h4>
            <ul id="points-list"></ul>
            <button class="btn-danger" style="margin-top: 10px; background-color: #6c757d;" onclick="clearAll()">🗑️ Wyczyść mapę</button>
            <div class="scroll-buffer"></div>
        </div>
    </div>

    <div id="edit-modal-overlay" class="modal-overlay hidden">
        <div id="edit-modal" class="modal-box">
            <h3 id="modal-title">Edycja elementu</h3>
            <label for="modal-input-name">Nazwa (maks. 50 znaków):</label>
            <input type="text" id="modal-input-name" placeholder="Wpisz nazwę...">
            <div id="modal-desc-container">
                <label for="modal-input-desc">Opis / Notatka (maks. 50 znaków):</label>
                <input type="text" id="modal-input-desc" placeholder="np. Kod do bramy 123...">
                <label for="modal-input-group" style="margin-top: 10px;">Przypisz do grupy:</label>
                <select id="modal-input-group"></select>
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeEditModal()">Anuluj</button>
                <button class="btn-success" onclick="saveModalChanges()">Zapisz</button>
            </div>
        </div>
    </div>

    <div id="action-modal-overlay" class="modal-overlay hidden">
        <div id="action-modal" class="modal-box">
            <h3>Jesteś na miejscu!</h3>
            <div id="action-modal-address">ul. Testowa 1, Miasto</div>
            <button class="btn-danger" onclick="confirmPointAction('completed')">✔️ Punkt Zaliczony</button>
            <button class="btn-warning" onclick="confirmPointAction('postponed')">🕒 Przyjadę później</button>
            <button class="btn-secondary" style="margin-top: 5px;" onclick="closeActionModal()">✖ Zamknij okno</button>
        </div>
    </div>

    <div id="proximity-alert" class="hidden"></div>
    <button id="center-btn" class="hidden" onclick="recenterMap()">🎯 Wyśrodkuj</button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ZMIANA: Domyślne przesuwanie w Leaflet jest WYŁĄCZONE (dragging: false) - kontrolujemy to całkowicie sami.
        const map = L.map('map', { zoomControl: false, dragging: false, touchZoom: true }).setView([51.9194, 19.1451], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);

        map.createPane('gpsPane');
        map.getPane('gpsPane').style.zIndex = 650; 
        map.getPane('gpsPane').style.pointerEvents = 'none'; 

        let deliveryPoints = [];
        let routeLayer = null; 
        let markersLayer = L.layerGroup().addTo(map);
        
        let trackingId = null;
        let courierMarker = null;
        let currentClosestId = null; 
        
        let isDriveModeActive = false;
        let isFollowingGPS = false; 
        
        let lastKnownPosition = null;
        let isFirstGPSFix = true; 
        
        let currentBearing = 0; 
        let lastRouteCalcPosition = null; 
        let priorityPointId = null;
        let wakeLock = null;

        let currentEditingType = null; 
        let currentEditingGroupId = null;
        let currentEditingAddressId = null;
        let currentActionPointId = null;

        let savedGroups = [];
        try {
            const rawGroups = localStorage.getItem('courierSavedGroups');
            if (rawGroups) { savedGroups = JSON.parse(rawGroups); } 
            else {
                savedGroups = [{ id: 'group_default', name: 'Ogólne', addresses: [] }];
                localStorage.setItem('courierSavedGroups', JSON.stringify(savedGroups));
            }
        } catch (e) {
            savedGroups = [{ id: 'group_default', name: 'Ogólne', addresses: [] }];
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180;
            const toDeg = 180 / Math.PI;
            const dLon = (lon2 - lon1) * toRad;
            const y = Math.sin(dLon) * Math.cos(lat2 * toRad);
            const x = Math.cos(lat1 * toRad) * Math.sin(lat2 * toRad) - Math.sin(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.cos(dLon);
            let brng = Math.atan2(y, x) * toDeg;
            return (brng + 360) % 360;
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        function releaseWakeLock() {
            if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); }
        }

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && isDriveModeActive) { await requestWakeLock(); }
        });

        function updateAlertLift() {
            const alertDiv = document.getElementById('proximity-alert');
            const centerBtn = document.getElementById('center-btn');
            if (!centerBtn.classList.contains('hidden')) { alertDiv.classList.add('lifted'); } 
            else { alertDiv.classList.remove('lifted'); }
        }

        function togglePanel() {
            const content = document.getElementById('ui-content'); const icon = document.getElementById('toggle-icon'); const panel = document.getElementById('ui-panel');
            if (content.classList.contains('hidden')) { content.classList.remove('hidden'); panel.classList.remove('collapsed'); icon.innerText = '▼'; } 
            else { content.classList.add('hidden'); panel.classList.add('collapsed'); icon.innerText = '▲'; }
        }

        function formatAddressString(apiData) {
            if (apiData.address) {
                const addr = apiData.address;
                const street = addr.road || addr.pedestrian || addr.suburb || addr.neighbourhood || "";
                const number = addr.house_number || "";
                const city = addr.city || addr.town || addr.village || addr.municipality || "";
                if (street && city) return `${street}${number ? ' ' + number : ''}, ${city}`;
            }
            const parts = apiData.display_name.split(',');
            if (parts.length >= 2) return parts[0].trim() + ', ' + parts[1].trim();
            return apiData.display_name;
        }

        async function addAddress() {
            const address = document.getElementById('address-input').value;
            if (!address) return;
            const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(address)}`;
            try {
                const response = await fetch(url); const data = await response.json();
                if (data && data.length > 0) {
                    const formattedName = formatAddressString(data[0]);
                    const isAdded = addPointToMapAndList(parseFloat(data[0].lat), parseFloat(data[0].lon), formattedName, "");
                    if (isAdded) document.getElementById('address-input').value = '';
                } else { alert("Nie udało się znaleźć adresu."); }
            } catch (error) { alert("Wystąpił problem z połączeniem."); }
        }

        function addPointToMapAndList(lat, lon, name, description = "", silent = false) {
            const isDuplicate = deliveryPoints.some(p => Math.abs(p.lat - lat) < 0.0001 && Math.abs(p.lon - lon) < 0.0001 && p.status === 'pending');
            if (isDuplicate) {
                if (!silent) alert(`Ten adres jest już na aktywnej trasie!\n(${name.split(',')[0]})`);
                return false;
            }
            const id = Date.now() + Math.floor(Math.random() * 1000);
            deliveryPoints.push({ id: id, lat: lat, lon: lon, name: name, description: description, status: 'pending' });
            updateListUI(); drawAllMarkers(); map.setView([lat, lon], 13);
            return true;
        }

        function updateListUI() {
            const listElement = document.getElementById('points-list'); listElement.innerHTML = ''; 
            deliveryPoints.forEach((point) => {
                const li = document.createElement('li'); const shortName = point.name.split(',')[0];
                let prefix = point.optLabel !== undefined ? `${point.optLabel}. ` : '- ';
                let star = (point.id === priorityPointId) ? '⭐ ' : '';
                if (point.status === 'completed') { li.style.textDecoration = 'line-through'; li.style.color = 'red'; }
                if (point.status === 'postponed') { li.style.color = '#d39e00'; }
                li.innerText = `${prefix}${star}${shortName}`; listElement.appendChild(li);
            });
        }

        function updateRouteStats(distance, duration) {
            const statsDiv = document.getElementById('route-stats');
            const km = (distance / 1000).toFixed(1); const hrs = Math.floor(duration / 3600); const mins = Math.floor((duration % 3600) / 60);
            let timeStr = ''; if (hrs > 0) timeStr += `${hrs}g `; timeStr += `${mins}m`;
            statsDiv.innerHTML = `🛣️ Zostało: <span style="color:#007bff">${km} km</span> | ⏱️ Czas: <span style="color:#28a745">${timeStr}</span>`;
            statsDiv.classList.remove('hidden');
        }

        function renderSavedAddresses() {
            const container = document.getElementById('saved-groups-container'); container.innerHTML = '';
            savedGroups.forEach((group) => {
                const details = document.createElement('details'); details.className = 'group-details';
                const summary = document.createElement('summary'); summary.className = 'group-summary';
                summary.innerHTML = `
                    <span class="group-summary-text" title="${group.name}">📁 ${group.name} (${group.addresses.length})</span>
                    <div class="group-actions">
                        <span class="action-edit" onclick="openGroupEditModal('${group.id}', event)">⚙️</span>
                        ${group.id !== 'group_default' ? `<span class="action-delete" onclick="deleteGroup('${group.id}', event)">✖</span>` : ''}
                    </div>
                `;
                details.appendChild(summary);
                const ul = document.createElement('ul'); ul.className = 'saved-item-list';
                if (group.addresses.length === 0) { ul.innerHTML = `<li style="font-size:11px; color:#888; padding:5px;">Pusta grupa</li>`; } 
                else {
                    group.addresses.forEach((addr) => {
                        const li = document.createElement('li'); li.className = 'saved-item';
                        li.innerHTML = `
                            <input type="checkbox" class="saved-checkbox" data-group-id="${group.id}" data-addr-id="${addr.id}">
                            <span class="name" title="${addr.name}${addr.description ? ' | Opis: ' + addr.description : ''}">
                                <b>${addr.name}</b> ${addr.description ? `<br><small style="color:#666; font-style:italic;">${addr.description}</small>` : ''}
                            </span>
                            <div class="item-actions">
                                <span class="action-edit" onclick="openAddressEditModal('${group.id}', '${addr.id}')" title="Edytuj">⚙️</span>
                                <span class="action-delete" onclick="deleteSavedAddress('${group.id}', '${addr.id}')" title="Usuń">✖</span>
                            </div>
                        `;
                        ul.appendChild(li);
                    });
                }
                details.appendChild(ul); container.appendChild(details);
            });
            updateGroupSelectDropdown();
        }

        function updateGroupSelectDropdown() {
            const select = document.getElementById('saved-group-select'); select.innerHTML = '';
            savedGroups.forEach(g => { const opt = document.createElement('option'); opt.value = g.id; opt.innerText = g.name; select.appendChild(opt); });
        }

        function createNewGroup() {
            let name = prompt("Wpisz nazwę nowej grupy (maks. 50 znaków):"); if (name === null) return;
            name = name.substring(0, 50).trim(); if (!name) { alert("Nazwa grupy nie może być pusta!"); return; }
            savedGroups.push({ id: 'group_' + Date.now(), name: name, addresses: [] }); saveGroupsToStorage();
        }

        function openGroupEditModal(groupId, event) {
            event.stopPropagation(); const group = savedGroups.find(g => g.id === groupId); if (!group) return;
            currentEditingType = 'group'; currentEditingGroupId = groupId;
            document.getElementById('modal-title').innerText = "Edycja grupy";
            document.getElementById('modal-input-name').value = group.name;
            document.getElementById('modal-desc-container').classList.add('hidden'); 
            document.getElementById('edit-modal-overlay').classList.remove('hidden');
        }

        function openAddressEditModal(groupId, addrId) {
            const group = savedGroups.find(g => g.id === groupId); if (!group) return;
            const addr = group.addresses.find(a => a.id === addrId); if (!addr) return;
            currentEditingType = 'address'; currentEditingGroupId = groupId; currentEditingAddressId = addrId;
            document.getElementById('modal-title').innerText = "Edycja adresu";
            document.getElementById('modal-input-name').value = addr.name;
            document.getElementById('modal-input-desc').value = addr.description || "";
            const modalSelect = document.getElementById('modal-input-group'); modalSelect.innerHTML = '';
            savedGroups.forEach(g => { const opt = document.createElement('option'); opt.value = g.id; opt.innerText = g.name; if (g.id === groupId) opt.selected = true; modalSelect.appendChild(opt); });
            document.getElementById('modal-desc-container').classList.remove('hidden'); 
            document.getElementById('edit-modal-overlay').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('edit-modal-overlay').classList.add('hidden'); currentEditingType = null; currentEditingGroupId = null; currentEditingAddressId = null; }

        function saveModalChanges() {
            const nameInput = document.getElementById('modal-input-name').value.substring(0, 50).trim();
            if (!nameInput) { alert("Nazwa nie może być pusta!"); return; }
            if (currentEditingType === 'group') {
                const group = savedGroups.find(g => g.id === currentEditingGroupId); if (group) group.name = nameInput;
            } else if (currentEditingType === 'address') {
                const oldGroup = savedGroups.find(g => g.id === currentEditingGroupId);
                if (oldGroup) {
                    const addrIndex = oldGroup.addresses.findIndex(a => a.id === currentEditingAddressId);
                    if (addrIndex !== -1) {
                        const addr = oldGroup.addresses[addrIndex]; const descInput = document.getElementById('modal-input-desc').value.substring(0, 50).trim(); const targetGroupId = document.getElementById('modal-input-group').value;
                        addr.name = nameInput; addr.description = descInput;
                        if (targetGroupId !== currentEditingGroupId) { const newGroup = savedGroups.find(g => g.id === targetGroupId); if (newGroup) { oldGroup.addresses.splice(addrIndex, 1); newGroup.addresses.push(addr); } }
                    }
                }
            }
            saveGroupsToStorage(); closeEditModal();
        }

        function deleteGroup(groupId, event) {
            event.stopPropagation(); const index = savedGroups.findIndex(g => g.id === groupId); if (index === -1) return;
            if (savedGroups[index].addresses.length > 0) { if (!confirm("Ta grupa zawiera zapisane adresy. Czy na pewno chcesz usunąć grupę wraz z całą jej zawartością?")) return; } else { if (!confirm("Usunąć tę grupę?")) return; }
            savedGroups.splice(index, 1); saveGroupsToStorage();
        }

        async function savePermanentAddress() {
            const address = document.getElementById('saved-address-input').value; const groupId = document.getElementById('saved-group-select').value; if (!address || !groupId) return;
            const group = savedGroups.find(g => g.id === groupId); if (!group) return;
            const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(address)}`;
            try {
                const response = await fetch(url); const data = await response.json();
                if (data && data.length > 0) {
                    const formattedName = formatAddressString(data[0]);
                    group.addresses.push({ id: 'addr_' + Date.now() + Math.floor(Math.random() * 100), lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), name: formattedName, description: "" });
                    saveGroupsToStorage(); document.getElementById('saved-address-input').value = '';
                } else { alert("Nie znaleziono adresu."); }
            } catch (error) { alert("Błąd połączenia."); }
        }

        function addSelectedSaved() {
            const checkboxes = document.querySelectorAll('.saved-checkbox:checked'); if(checkboxes.length === 0) { alert("Zaznacz najpierw adresy z grup."); return; }
            let duplicatesCount = 0;
            checkboxes.forEach(cb => {
                const group = savedGroups.find(g => g.id === cb.getAttribute('data-group-id'));
                if (group) { const addr = group.addresses.find(a => a.id === cb.getAttribute('data-addr-id')); if (addr) { const success = addPointToMapAndList(addr.lat, addr.lon, addr.name, addr.description || "", true); if (!success) duplicatesCount++; } }
                cb.checked = false;
            });
            if (duplicatesCount > 0) alert(`Pominięto ${duplicatesCount} adres(ów), ponieważ znajdują się już na bieżącej trasie.`);
        }

        function deleteSavedAddress(groupId, addrId) {
            const group = savedGroups.find(g => g.id === groupId); if (!group) return;
            const index = group.addresses.findIndex(a => a.id === addrId); if (index !== -1 && confirm("Usunąć ten adres ze stałych?")) { group.addresses.splice(index, 1); saveGroupsToStorage(); }
        }

        function saveGroupsToStorage() { localStorage.setItem('courierSavedGroups', JSON.stringify(savedGroups)); renderSavedAddresses(); }

        function drawAllMarkers() {
            markersLayer.clearLayers();
            deliveryPoints.forEach((point) => {
                let className = 'custom-marker'; 
                if (point.status === 'completed') className += ' zaliczony'; 
                else if (point.status === 'postponed') className += ' pozniej';
                else if (point.id === priorityPointId) className += ' priorytet'; 
                
                const customIcon = L.divIcon({ className: className, html: point.optLabel !== undefined ? point.optLabel : '', iconSize: [32, 32], iconAnchor: [16, 16] });
                
                const popupHtml = `
                    <div style="font-size: 13px; min-width: 150px;">
                        <b>Kolejność: ${point.optLabel !== undefined ? point.optLabel : 'Brak'}</b><br>
                        <strong style="font-size:14px; color:#222;">${point.name}</strong><br>
                        ${point.description ? `<div style="margin-top:4px; padding: 4px; background:#f8f9fa; border-left: 3px solid #17a2b8; font-style: italic; color: #555;">📝 ${point.description}</div>` : ''}
                        
                        <div style="margin-top: 10px;">
                            <button class="btn-info" style="padding: 8px; font-size: 14px; margin-bottom: 8px; width: 100%; background-color: #17a2b8;" onclick="setPriorityPoint(${point.id})">⭐ Priorytet</button>
                            ${point.status === 'pending' ? `
                            <button class="btn-danger" style="padding: 5px; margin-bottom: 5px;" onclick="updatePointStatus(${point.id}, 'completed')">✔️ Zaliczony</button>
                            <button class="btn-warning" style="padding: 5px; margin-bottom: 0;" onclick="updatePointStatus(${point.id}, 'postponed')">🕒 Później</button>
                            ` : `
                            <div style="margin-bottom: 5px; color: ${point.status === 'completed' ? 'red' : '#d39e00'}; font-weight: bold; text-align: center;">Status: ${point.status === 'completed' ? 'Zaliczony' : 'Zostawiony na później'}</div>
                            <button style="padding: 5px; margin-top: 0; background: #6c757d; color: white;" onclick="updatePointStatus(${point.id}, 'pending')">Cofnij zmianę</button>
                            `}
                        </div>
                    </div>
                `;
                L.marker([point.lat, point.lon], { icon: customIcon }).addTo(markersLayer).bindPopup(popupHtml);
            });
        }

        window.setPriorityPoint = async function(id) {
            priorityPointId = id; const pt = deliveryPoints.find(p => p.id === id); if(pt) pt.status = 'pending'; map.closePopup();
            const btn = document.getElementById('track-btn'); btn.innerText = "⏳ Przeliczanie..."; 
            await optimizeRoute();
            if (isDriveModeActive) { btn.innerText = "⏹ Zatrzymaj podążanie"; } else { btn.innerText = "🚀 Wyruszam!"; }
        }

        window.updatePointStatus = function(id, newStatus) {
            const pt = deliveryPoints.find(p => p.id === id);
            if(pt) {
                pt.status = newStatus; if (id === priorityPointId && newStatus !== 'pending') { priorityPointId = null; }
                map.closePopup(); if(currentClosestId === id) { document.getElementById('proximity-alert').classList.add('hidden'); currentClosestId = null; }
                updateListUI(); drawAllMarkers(); recalculateRouteLine(false); 
            }
        }

        async function optimizeRoute() {
            const routePoints = deliveryPoints.filter(p => p.status === 'pending'); if (routePoints.length < 1) { return true; } 
            if (!lastKnownPosition) { alert("Oczekiwanie na sygnał GPS..."); return false; }
            if (routePoints.length === 1) {
                routePoints[0].optLabel = 1; updateListUI(); drawAllMarkers(); await recalculateRouteLine(true); return true;
            }
            let coordsArray = [];
            if (priorityPointId && routePoints.some(p => p.id === priorityPointId)) {
                const prioPt = routePoints.find(p => p.id === priorityPointId); const others = routePoints.filter(p => p.id !== priorityPointId);
                coordsArray.push(`${prioPt.lon},${prioPt.lat}`); others.forEach(p => coordsArray.push(`${p.lon},${p.lat}`));
                const osrmUrl = `https://router.project-osrm.org/trip/v1/driving/${coordsArray.join(';')}?source=first&roundtrip=false&overview=false`;
                try {
                    const response = await fetch(osrmUrl); const data = await response.json();
                    if (data.code === 'Ok') {
                        prioPt.optLabel = 1; others.forEach((point, index) => { point.optLabel = data.waypoints[index + 1].waypoint_index + 1; });
                        updateListUI(); drawAllMarkers(); await recalculateRouteLine(true); return true;
                    } else { return false; }
                } catch (error) { return false; }
            } else {
                coordsArray.push(`${lastKnownPosition[1]},${lastKnownPosition[0]}`); routePoints.forEach(p => coordsArray.push(`${p.lon},${p.lat}`));     
                const osrmUrl = `https://router.project-osrm.org/trip/v1/driving/${coordsArray.join(';')}?source=first&roundtrip=false&overview=false`;
                try {
                    const response = await fetch(osrmUrl); const data = await response.json();
                    if (data.code === 'Ok') {
                        routePoints.forEach((point, index) => { const optIndex = data.waypoints[index + 1].waypoint_index; point.optLabel = optIndex; });
                        updateListUI(); drawAllMarkers(); await recalculateRouteLine(true); return true;
                    } else { return false; }
                } catch (error) { return false; }
            }
        }

        async function recalculateRouteLine(fitBounds = false) {
            const routePoints = deliveryPoints.filter(p => p.status === 'pending');
            routePoints.sort((a, b) => { return (a.optLabel !== undefined ? a.optLabel : 999) - (b.optLabel !== undefined ? b.optLabel : 999); });
            let coordsArray = []; if (lastKnownPosition) coordsArray.push(`${lastKnownPosition[1]},${lastKnownPosition[0]}`); routePoints.forEach(p => coordsArray.push(`${p.lon},${p.lat}`)); 
            if (coordsArray.length < 2) { if (routeLayer) map.removeLayer(routeLayer); document.getElementById('route-stats').classList.add('hidden'); return; }
            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsArray.join(';')}?overview=full&geometries=geojson`);
                const data = await response.json();
                if (data.code === 'Ok') {
                    if (routeLayer) map.removeLayer(routeLayer);
                    routeLayer = L.geoJSON(data.routes[0].geometry, { style: { color: '#007bff', weight: 5, opacity: 0.7 } }).addTo(map);
                    updateRouteStats(data.routes[0].distance, data.routes[0].duration);
                    if (lastKnownPosition) lastRouteCalcPosition = [...lastKnownPosition];
                    if (fitBounds && !isFollowingGPS) { map.fitBounds(routeLayer.getBounds()); }
                }
            } catch (error) {}
        }

        function clearAll() {
            if (confirm("Usunąć trasę z mapy?")) {
                deliveryPoints = []; updateListUI(); markersLayer.clearLayers();
                if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
                document.getElementById('proximity-alert').classList.add('hidden'); currentClosestId = null; document.getElementById('route-stats').classList.add('hidden');
                lastRouteCalcPosition = null; priorityPointId = null;
            }
        }

        function handleUserMapInteraction() {
            if (isFollowingGPS) {
                isFollowingGPS = false;
                document.getElementById('center-btn').classList.remove('hidden');
                updateAlertLift();
            }
        }

        // ZMIANA: Twarda Matematyka 2D. Wektor palca przekształcany przez kąt do standardowego punktu Leafleta.
        function initCustomDragging() {
            const mapDiv = document.getElementById('map');
            let isDragging = false;
            let dragLastX = 0, dragLastY = 0;
            let dragRAF = null;
            let activePointers = 0;

            mapDiv.addEventListener('pointerdown', (e) => {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                activePointers++;
                
                // Blokujemy nasze przesuwanie, jeżeli ktoś przykłada 2 palce (wtedy działa zoom Leafleta)
                if (activePointers === 1) {
                    isDragging = true;
                    dragLastX = e.clientX;
                    dragLastY = e.clientY;
                    mapDiv.setPointerCapture(e.pointerId);
                    handleUserMapInteraction();
                } else {
                    isDragging = false;
                }
            });

            mapDiv.addEventListener('pointermove', (e) => {
                if (!isDragging || activePointers !== 1) return;
                e.preventDefault();

                // 1. Zbieramy czysty ruch palca na fizycznym ekranie
                let screenDx = e.clientX - dragLastX;
                let screenDy = e.clientY - dragLastY;
                
                dragLastX = e.clientX;
                dragLastY = e.clientY;

                // 2. Przekształcamy ruch przez macierz obrotu dla aktualnego kąta
                let rad = currentBearing * Math.PI / 180;
                
                // Formuła odwracająca ruch z ekranu na "północną" mapę pod spodem
                let mapDx = screenDx * Math.cos(rad) - screenDy * Math.sin(rad);
                let mapDy = screenDx * Math.sin(rad) + screenDy * Math.cos(rad);

                // 3. Leaflet .panBy sam zarządza subpikselami
                if (!dragRAF) {
                    dragRAF = requestAnimationFrame(() => {
                        // Przesuwamy widok - wektor w panBy musi być odwrotny do fizycznego ruchu "świata"
                        map.panBy([-mapDx, -mapDy], { animate: false });
                        dragRAF = null;
                    });
                }
            });

            function endPointer(e) {
                activePointers = Math.max(0, activePointers - 1);
                try { mapDiv.releasePointerCapture(e.pointerId); } catch(err) {}
                
                if (activePointers === 0) {
                    isDragging = false;
                    if (dragRAF) { cancelAnimationFrame(dragRAF); dragRAF = null; }
                }
            }

            mapDiv.addEventListener('pointerup', endPointer);
            mapDiv.addEventListener('pointercancel', endPointer);
        }

        function recenterMap() { 
            isFollowingGPS = true; 
            document.getElementById('center-btn').classList.add('hidden'); 
            updateAlertLift(); 
            if (lastKnownPosition) { map.panTo(lastKnownPosition); } 
        }

        async function toggleDriveMode() {
            const btn = document.getElementById('track-btn');
            const mapEl = document.getElementById('map');

            if (isDriveModeActive) {
                isDriveModeActive = false;
                isFollowingGPS = false;
                btn.innerText = "🚀 Wyruszam!"; 
                btn.className = "btn-success"; 
                btn.style.backgroundColor = "#28a745";
                document.getElementById('center-btn').classList.add('hidden'); 
                updateAlertLift(); 
                releaseWakeLock();
                
                mapEl.style.transition = 'transform 0.5s ease-out';
                mapEl.style.transform = `translate(-50%, -50%) rotate(0deg)`;
            } else {
                const routePoints = deliveryPoints.filter(p => p.status === 'pending');
                if (routePoints.length > 0) {
                    btn.innerText = "⏳ Wyznaczam trasę..."; 
                    const success = await optimizeRoute();
                    if (!success) { btn.innerText = "🚀 Wyruszam!"; return; }
                }
                
                isDriveModeActive = true;
                isFollowingGPS = true;
                btn.innerText = "⏹ Zatrzymaj podążanie"; 
                btn.className = "btn-danger"; 
                btn.style.backgroundColor = "#dc3545";
                document.getElementById('center-btn').classList.add('hidden'); 
                updateAlertLift();
                await requestWakeLock();
                
                if (lastKnownPosition) map.setView(lastKnownPosition, 16);
                
                mapEl.style.transition = 'transform 0.5s ease-out';
                mapEl.style.transform = `translate(-50%, -50%) rotate(${-currentBearing}deg)`;
                
                const content = document.getElementById('ui-content');
                if (!content.classList.contains('hidden')) { togglePanel(); }
            }
        }

        function openActionModal(pointId) {
            const pt = deliveryPoints.find(p => p.id === pointId); if (!pt) return;
            currentActionPointId = pointId; document.getElementById('action-modal-address').innerText = pt.name;
            document.getElementById('action-modal-overlay').classList.remove('hidden');
        }

        closeActionModal = function() { document.getElementById('action-modal-overlay').classList.add('hidden'); currentActionPointId = null; }
        function confirmPointAction(status) { if (currentActionPointId) { updatePointStatus(currentActionPointId, status); closeActionModal(); } }

        function initAutomaticGPS() {
            if (!navigator.geolocation) { alert("Urządzenie nie obsługuje geolokalizacji."); return; }
            trackingId = navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude; const lon = position.coords.longitude; 
                    
                    let speed = position.coords.speed;
                    let heading = position.coords.heading;
                    let distSinceLast = 0;
                    
                    if (lastKnownPosition) { distSinceLast = map.distance([lat, lon], lastKnownPosition); }
                    let isMoving = (speed !== null && speed > 0.8) || (distSinceLast > 5);

                    if (isMoving && lastKnownPosition) {
                        if (heading === null || isNaN(heading)) { heading = getBearing(lastKnownPosition[0], lastKnownPosition[1], lat, lon); }
                        if (heading !== null && !isNaN(heading)) {
                            let delta = heading - (currentBearing % 360);
                            if (delta > 180) delta -= 360; if (delta < -180) delta += 360;
                            currentBearing += delta;
                        }
                    }
                    
                    lastKnownPosition = [lat, lon];
                    
                    if (!courierMarker) { courierMarker = L.circleMarker([lat, lon], { color: '#dc3545', fillColor: '#dc3545', fillOpacity: 1, radius: 8, pane: 'gpsPane' }).addTo(map); } 
                    else { courierMarker.setLatLng([lat, lon]); }
                    
                    if (isFirstGPSFix) { 
                        map.setView([lat, lon], 16); isFirstGPSFix = false; 
                        if (deliveryPoints.filter(p => p.status === 'pending').length >= 1) recalculateRouteLine(); 
                    }
                    
                    if (isDriveModeActive) {
                        const mapEl = document.getElementById('map');
                        mapEl.style.transition = 'transform 0.5s ease-out';
                        mapEl.style.transform = `translate(-50%, -50%) rotate(${-currentBearing}deg)`;
                    }
                    
                    if (isFollowingGPS) { 
                        map.panTo([lat, lon]); 
                        if (deliveryPoints.filter(p => p.status === 'pending').length >= 1) {
                            if (!lastRouteCalcPosition) { lastRouteCalcPosition = [lat, lon]; } 
                            else {
                                const distMoved = map.distance([lat, lon], lastRouteCalcPosition);
                                if (distMoved > 40) { lastRouteCalcPosition = [lat, lon]; recalculateRouteLine(false); }
                            }
                        }
                    }

                    let closestPoint = null; let minDistance = 300; 
                    deliveryPoints.forEach(pt => { if (pt.status === 'pending') { const dist = map.distance([lat, lon], [pt.lat, pt.lon]); if (dist < minDistance) { minDistance = dist; closestPoint = pt; } } });
                    
                    const alertDiv = document.getElementById('proximity-alert');
                    if (closestPoint) {
                        const shortAddr = closestPoint.name.split(',')[0];
                        if (currentClosestId !== closestPoint.id) {
                            alertDiv.innerHTML = `📍 Cel blisko (<span id="prox-dist">${Math.round(minDistance)}</span>m)<br><small>${shortAddr}</small>`;
                            alertDiv.onclick = function() { openActionModal(closestPoint.id); };
                            alertDiv.classList.remove('hidden'); currentClosestId = closestPoint.id; updateAlertLift(); 
                        } else { const distSpan = document.getElementById('prox-dist'); if (distSpan) distSpan.innerText = Math.round(minDistance); }
                    } else { alertDiv.classList.add('hidden'); currentClosestId = null; }
                },
                (error) => { console.error("Błąd GPS", error); },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        renderSavedAddresses();
        initCustomDragging(); // Włączenie silnika dotyku
        initAutomaticGPS();
    </script>
</body>
</html>

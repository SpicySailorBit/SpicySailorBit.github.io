<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planer Trasy Kuriera</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; }
        
        #ui-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            width: 320px; max-width: 90vw; display: flex; flex-direction: column;
            max-height: 95vh; overflow-y: auto;
        }
        
        #ui-header {
            background-color: #343a40; color: white; padding: 15px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 16px; position: sticky; top: 0; z-index: 2;
        }
        
        #ui-panel:not(.collapsed) #ui-header { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        #ui-content { padding: 15px; }
        .hidden { display: none !important; }
        
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;}
        
        button { width: 100%; padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-primary { background-color: #007bff; } .btn-primary:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; } .btn-success:hover { background-color: #218838; }
        .btn-warning { background-color: #ffc107; color: #212529; } .btn-warning:hover { background-color: #e0a800; }
        .btn-danger { background-color: #dc3545; } .btn-danger:hover { background-color: #c82333; }
        .btn-info { background-color: #17a2b8; } .btn-info:hover { background-color: #138496; }
        
        #points-list { margin-top: 10px; padding-left: 20px; font-size: 14px; max-height: 100px; overflow-y: auto; }
        hr { border: 0; height: 1px; background: #ddd; margin: 15px 0; }

        .custom-marker {
            background-color: #007bff; color: white; border-radius: 50%;
            text-align: center; line-height: 28px; font-size: 14px;
            font-weight: bold; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .custom-marker.baza { background-color: #28a745; } 
        .custom-marker.zaliczony { background-color: #dc3545; } 
        .custom-marker.pozniej { background-color: #ffc107; color: #212529; } 

        details { background: #f8f9fa; padding: 10px; border-radius: 4px; border: 1px solid #ddd; margin-bottom: 15px; }
        summary { font-weight: bold; cursor: pointer; outline: none; margin-bottom: 5px; }
        #saved-points-list { list-style: none; padding-left: 0; max-height: 150px; overflow-y: auto; margin-top: 10px; }
        .saved-item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; background: white; padding: 5px; border-radius: 4px; border: 1px solid #eee;}
        .saved-item span.name { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .saved-item span.delete { color: #dc3545; cursor: pointer; font-weight: bold; padding: 0 5px; }

        #proximity-alert {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #007bff;
            width: 250px; max-width: 80vw;
        }

        #center-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background-color: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 25px;
            font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            width: auto; margin-bottom: 0; display: inline-block;
        }
        #center-btn:hover { background-color: #0056b3; }
        
        /* Panel statystyk trasy */
        #route-stats {
            background: #e9ecef; padding: 10px; border-radius: 4px; margin-bottom: 10px;
            font-weight: bold; font-size: 14px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div id="ui-header" onclick="togglePanel()">
            <span>Menu Trasy</span>
            <span id="toggle-icon">▼</span>
        </div>
        
        <div id="ui-content">
            <input type="text" id="address-input" placeholder="np. Wawel 5, Kraków">
            <button class="btn-primary" onclick="addAddress()">➕ Dodaj do trasy</button>
            
            <details>
                <summary>📂 Stałe adresy (Zapisane)</summary>
                <div style="margin-top: 10px;">
                    <input type="text" id="saved-address-input" placeholder="Dodaj nowy stały adres">
                    <button class="btn-info" onclick="savePermanentAddress()">💾 Zapisz w stałych</button>
                    <ul id="saved-points-list"></ul>
                    <button class="btn-success" style="margin-bottom: 0;" onclick="addSelectedSaved()">✔️ Dodaj zaznaczone</button>
                </div>
            </details>
            
            <button class="btn-success" onclick="optimizeRoute()">🛣️ Wyznacz trasę</button>
            
            <div id="route-stats" class="hidden"></div>
            
            <hr>
            <button id="track-btn" class="btn-warning" onclick="toggleTracking()">📍 Rozpocznij śledzenie GPS</button>
            
            <h4 style="margin-bottom: 5px; margin-top: 10px;">Lista punktów:</h4>
            <ul id="points-list"></ul>
            
            <button class="btn-danger" style="margin-top: 10px; background-color: #6c757d;" onclick="clearAll()">🗑️ Wyczyść mapę</button>
        </div>
    </div>

    <div id="proximity-alert" class="hidden"></div>
    <button id="center-btn" class="hidden" onclick="recenterMap()">🎯 Wyśrodkuj</button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const map = L.map('map', { zoomControl: false }).setView([51.9194, 19.1451], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);

        let deliveryPoints = [];
        let routeLayer = null; 
        let markersLayer = L.layerGroup().addTo(map);
        
        let trackingId = null;
        let courierMarker = null;
        let currentClosestId = null; 
        
        let isFollowingGPS = false;
        let lastKnownPosition = null;

        let savedAddresses = JSON.parse(localStorage.getItem('courierSavedAddresses')) || [];

        function togglePanel() {
            const content = document.getElementById('ui-content');
            const icon = document.getElementById('toggle-icon');
            const panel = document.getElementById('ui-panel');
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden'); panel.classList.remove('collapsed'); icon.innerText = '▼';
            } else {
                content.classList.add('hidden'); panel.classList.add('collapsed'); icon.innerText = '▲';
            }
        }

        async function addAddress() {
            const address = document.getElementById('address-input').value;
            if (!address) return;
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data && data.length > 0) {
                    addPointToMapAndList(parseFloat(data[0].lat), parseFloat(data[0].lon), data[0].display_name);
                    document.getElementById('address-input').value = '';
                } else { alert("Nie udało się znaleźć adresu."); }
            } catch (error) { alert("Wystąpił problem z połączeniem."); }
        }

        function addPointToMapAndList(lat, lon, name) {
            const id = Date.now() + Math.floor(Math.random() * 1000);
            deliveryPoints.push({ id: id, lat: lat, lon: lon, name: name, status: 'pending' });
            updateListUI();
            drawAllMarkers();
            map.setView([lat, lon], 13);
        }

        function updateListUI() {
            const listElement = document.getElementById('points-list');
            listElement.innerHTML = ''; 
            deliveryPoints.forEach((point) => {
                const li = document.createElement('li');
                const shortName = point.name.split(',')[0] + ', ' + point.name.split(',')[1];
                let prefix = point.optLabel !== undefined ? `${point.isBase ? '[BAZA]' : point.optLabel}. ` : '- ';
                
                if (point.status === 'completed') { li.style.textDecoration = 'line-through'; li.style.color = 'red'; }
                if (point.status === 'postponed') { li.style.color = '#d39e00'; }
                
                li.innerText = `${prefix}${shortName}`;
                listElement.appendChild(li);
            });
        }

        // NOWOŚĆ: Funkcja formatująca kilometry i czas
        function updateRouteStats(distance, duration) {
            const statsDiv = document.getElementById('route-stats');
            const km = (distance / 1000).toFixed(1);
            const hrs = Math.floor(duration / 3600);
            const mins = Math.floor((duration % 3600) / 60);
            
            let timeStr = '';
            if (hrs > 0) timeStr += `${hrs}g `;
            timeStr += `${mins}m`;
            
            statsDiv.innerHTML = `🛣️ Zostało: <span style="color:#007bff">${km} km</span> | ⏱️ Czas: <span style="color:#28a745">${timeStr}</span>`;
            statsDiv.classList.remove('hidden');
        }

        function renderSavedAddresses() {
            const list = document.getElementById('saved-points-list'); list.innerHTML = '';
            savedAddresses.forEach((pt, index) => {
                const shortName = pt.name.split(',')[0] + ', ' + pt.name.split(',')[1];
                const li = document.createElement('li'); li.className = 'saved-item';
                li.innerHTML = `<input type="checkbox" class="saved-checkbox" value="${index}"><span class="name" title="${pt.name}">${shortName}</span><span class="delete" onclick="deleteSavedAddress(${index})" title="Usuń">✖</span>`;
                list.appendChild(li);
            });
        }

        async function savePermanentAddress() {
            const address = document.getElementById('saved-address-input').value;
            if (!address) return;
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data && data.length > 0) {
                    savedAddresses.push({ lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), name: data[0].display_name });
                    localStorage.setItem('courierSavedAddresses', JSON.stringify(savedAddresses));
                    renderSavedAddresses(); document.getElementById('saved-address-input').value = '';
                }
            } catch (error) {}
        }

        function addSelectedSaved() {
            document.querySelectorAll('.saved-checkbox:checked').forEach(cb => {
                const pt = savedAddresses[cb.value]; addPointToMapAndList(pt.lat, pt.lon, pt.name); cb.checked = false;
            });
        }

        function deleteSavedAddress(index) {
            if(confirm("Usunąć ze stałych?")) { savedAddresses.splice(index, 1); localStorage.setItem('courierSavedAddresses', JSON.stringify(savedAddresses)); renderSavedAddresses(); }
        }

        function drawAllMarkers() {
            markersLayer.clearLayers();
            deliveryPoints.forEach((point) => {
                let className = 'custom-marker';
                if (point.status === 'completed') className += ' zaliczony';
                else if (point.status === 'postponed') className += ' pozniej';
                else if (point.isBase) className += ' baza';

                const label = point.optLabel !== undefined ? point.optLabel : '';
                const customIcon = L.divIcon({ className: className, html: label, iconSize: [32, 32], iconAnchor: [16, 16] });

                const popupHtml = `
                    <div style="font-size: 13px;">
                        <b>Kolejność: ${point.isBase ? 'Baza' : (point.optLabel !== undefined ? point.optLabel : 'Brak')}</b><br>
                        ${point.name}<br>
                        ${point.status === 'pending' ? `
                        <div style="margin-top: 10px;">
                            <button class="btn-danger" style="padding: 5px; margin-bottom: 5px;" onclick="updatePointStatus(${point.id}, 'completed')">✔️ Zaliczony</button>
                            <button class="btn-warning" style="padding: 5px; margin-bottom: 0;" onclick="updatePointStatus(${point.id}, 'postponed')">🕒 Później</button>
                        </div>
                        ` : `
                        <div style="margin-top: 10px; color: ${point.status === 'completed' ? 'red' : '#d39e00'}; font-weight: bold;">
                            Status: ${point.status === 'completed' ? 'Zaliczony' : 'Zostawiony na później'}
                        </div>
                        <button style="padding: 5px; margin-top: 5px; background: #6c757d; color: white;" onclick="updatePointStatus(${point.id}, 'pending')">Cofnij zmianę</button>
                        `}
                    </div>
                `;

                L.marker([point.lat, point.lon], { icon: customIcon }).addTo(markersLayer).bindPopup(popupHtml);
            });
        }

        window.updatePointStatus = function(id, newStatus) {
            const pt = deliveryPoints.find(p => p.id === id);
            if(pt) {
                pt.status = newStatus;
                map.closePopup();
                if(currentClosestId === id) { document.getElementById('proximity-alert').classList.add('hidden'); currentClosestId = null; }
                updateListUI(); drawAllMarkers(); recalculateRouteLine(); 
            }
        }

        async function optimizeRoute() {
            const routePoints = deliveryPoints.filter(p => p.status === 'pending');
            if (routePoints.length < 2) { alert("Musisz dodać co najmniej 2 punkty!"); return; }
            
            const coordinatesString = routePoints.map(p => `${p.lon},${p.lat}`).join(';');
            const osrmUrl = `https://router.project-osrm.org/trip/v1/driving/${coordinatesString}?source=first&roundtrip=true&overview=full&geometries=geojson`;
            
            try {
                const response = await fetch(osrmUrl);
                const data = await response.json();
                if (data.code === 'Ok') {
                    if (routeLayer) map.removeLayer(routeLayer);
                    routeLayer = L.geoJSON(data.trips[0].geometry, { style: { color: '#007bff', weight: 5, opacity: 0.7 } }).addTo(map);
                    
                    routePoints.forEach((point, index) => {
                        const optIndex = data.waypoints[index].waypoint_index;
                        point.optLabel = optIndex === 0 ? 'B' : optIndex;
                        point.isBase = (optIndex === 0);
                    });

                    updateListUI(); drawAllMarkers();
                    
                    // Zaktualizuj licznik dla pierwszej wyznaczonej trasy
                    updateRouteStats(data.trips[0].distance, data.trips[0].duration);

                    if (!trackingId) map.fitBounds(routeLayer.getBounds());
                    if (window.innerWidth < 768) togglePanel();
                } else { alert("Nie udało się wyznaczyć trasy."); }
            } catch (error) {}
        }

        // NOWOŚĆ: Logika rysowania trasy z uwzględnieniem lokalizacji GPS i zachowaniem numeracji
        async function recalculateRouteLine() {
            const routePoints = deliveryPoints.filter(p => p.status === 'pending');
            
            // Sortujemy punkty, aby zachować wcześniej wyznaczoną kolejność (1, 2, 3...), a Bazę dajemy na sam koniec
            routePoints.sort((a, b) => {
                if (a.isBase) return 1;
                if (b.isBase) return -1;
                const valA = a.optLabel !== undefined ? a.optLabel : 999;
                const valB = b.optLabel !== undefined ? b.optLabel : 999;
                return valA - valB;
            });

            let coordsArray = [];
            
            // 1. START OD GPS: Jeśli mamy GPS, dodajemy Twoją czerwoną kropkę jako start trasy
            if (trackingId && lastKnownPosition) {
                coordsArray.push(`${lastKnownPosition[1]},${lastKnownPosition[0]}`);
            }
            
            // 2. Dodajemy resztę punktów z optymalnej trasy
            routePoints.forEach(p => coordsArray.push(`${p.lon},${p.lat}`));

            if (coordsArray.length < 2) {
                if (routeLayer) map.removeLayer(routeLayer);
                document.getElementById('route-stats').classList.add('hidden');
                return;
            }

            // Używamy API '/route/' (zwykła ścieżka od A do B do C), a nie API komiwojażera
            const coordinatesString = coordsArray.join(';');
            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${coordinatesString}?overview=full&geometries=geojson`;
            
            try {
                const response = await fetch(osrmUrl);
                const data = await response.json();
                if (data.code === 'Ok') {
                    if (routeLayer) map.removeLayer(routeLayer);
                    routeLayer = L.geoJSON(data.routes[0].geometry, { style: { color: '#007bff', weight: 5, opacity: 0.7 } }).addTo(map);
                    
                    // Zaktualizuj licznik kilometrów, który teraz naturalnie "odlicza" w dół!
                    updateRouteStats(data.routes[0].distance, data.routes[0].duration);
                }
            } catch (error) {}
        }

        function clearAll() {
            if (confirm("Usunąć trasę z mapy?")) {
                deliveryPoints = []; updateListUI(); markersLayer.clearLayers();
                if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
                document.getElementById('proximity-alert').classList.add('hidden'); currentClosestId = null;
                document.getElementById('route-stats').classList.add('hidden');
            }
        }

        map.on('dragstart', () => {
            if (trackingId && isFollowingGPS) {
                isFollowingGPS = false; 
                document.getElementById('center-btn').classList.remove('hidden'); 
            }
        });

        function recenterMap() {
            isFollowingGPS = true; 
            document.getElementById('center-btn').classList.add('hidden'); 
            if (lastKnownPosition) { map.panTo(lastKnownPosition); }
        }

        function toggleTracking() {
            if (!navigator.geolocation) { alert("Brak obsługi GPS."); return; }
            const btn = document.getElementById('track-btn');
            const centerBtn = document.getElementById('center-btn');

            if (trackingId) {
                navigator.geolocation.clearWatch(trackingId); trackingId = null;
                isFollowingGPS = false; centerBtn.classList.add('hidden'); 
                if (courierMarker) { map.removeLayer(courierMarker); courierMarker = null; }
                btn.innerText = "📍 Rozpocznij śledzenie GPS"; btn.className = "btn-warning";
            } else {
                btn.innerText = "⏹ Zakończ śledzenie"; btn.className = "btn-danger";
                isFollowingGPS = true; 

                trackingId = navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude; const lon = position.coords.longitude;
                        const firstFix = !lastKnownPosition;
                        lastKnownPosition = [lat, lon]; 

                        if (!courierMarker) { courierMarker = L.circleMarker([lat, lon], { color: '#dc3545', fillColor: '#dc3545', fillOpacity: 1, radius: 8 }).addTo(map); } 
                        else { courierMarker.setLatLng([lat, lon]); }
                        
                        if (isFollowingGPS) { map.panTo([lat, lon]); }

                        // Po pierwszym złapaniu sygnału GPS, przypnij linię nawigacyjną do kropki
                        if (firstFix && deliveryPoints.filter(p => p.status === 'pending').length >= 1) {
                            recalculateRouteLine();
                        }

                        let closestPoint = null;
                        let minDistance = 1000; 

                        deliveryPoints.forEach(pt => {
                            if (pt.status === 'pending') {
                                const dist = map.distance([lat, lon], [pt.lat, pt.lon]);
                                if (dist < minDistance) { minDistance = dist; closestPoint = pt; }
                            }
                        });

                        const alertDiv = document.getElementById('proximity-alert');
                        if (closestPoint) {
                            if (currentClosestId !== closestPoint.id) {
                                alertDiv.innerHTML = `
                                    <div style="font-size: 14px; margin-bottom: 8px;">
                                        <b>Jesteś blisko celu:</b><br>
                                        <span id="prox-dist">${Math.round(minDistance)}</span>m - ${closestPoint.name}
                                    </div>
                                    <button class="btn-danger" style="margin-bottom: 5px; padding: 8px;" onclick="updatePointStatus(${closestPoint.id}, 'completed')">✔️ Punkt Zaliczony</button>
                                    <button class="btn-warning" style="margin-bottom: 0; padding: 8px;" onclick="updatePointStatus(${closestPoint.id}, 'postponed')">🕒 Przyjadę później</button>
                                `;
                                alertDiv.classList.remove('hidden'); currentClosestId = closestPoint.id;
                            } else {
                                const distSpan = document.getElementById('prox-dist');
                                if (distSpan) distSpan.innerText = Math.round(minDistance);
                            }
                        } else { alertDiv.classList.add('hidden'); currentClosestId = null; }
                    },
                    (error) => {
                        alert("Brak dostępu do lokalizacji."); navigator.geolocation.clearWatch(trackingId); trackingId = null;
                        isFollowingGPS = false; centerBtn.classList.add('hidden');
                        btn.innerText = "📍 Rozpocznij śledzenie GPS"; btn.className = "btn-warning";
                    }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
            }
        }

        renderSavedAddresses();
    </script>
</body>
</html>

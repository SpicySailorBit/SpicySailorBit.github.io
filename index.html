<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Canvas test</title>
</head>
<body>
  <canvas id="canvas" width="500" height="300"></canvas>
  <p id="status"></p>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const canvas = document.getElementById("canvas");
      const status = document.getElementById("status");

      if (!canvas) {
        console.error('No element with id="canvas" was found.');
        status.textContent = "Error: Canvas element was not found.";
        return;
      }

      const ctx = canvas.getContext("2d");

      if (!ctx) {
        console.error("The Canvas 2D context could not be created.");
        status.textContent = "Error: Canvas 2D context unavailable.";
        return;
      }

      ctx.fillStyle = "#17324d";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 28px sans-serif";
      ctx.fillText("Canvas works in Brave", 75, 155);

      status.textContent = "Success";
    });
  </script>
</body>
</html>

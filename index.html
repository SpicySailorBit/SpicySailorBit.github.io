<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Mona Lisa Canvas Animation</title>

  <style>
    :root {
      color-scheme: dark;
      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f6ead4;
      background:
        radial-gradient(
          circle at 50% 15%,
          #504338 0%,
          #251e1a 48%,
          #0e0c0b 100%
        );
    }

    .app {
      width: min(100%, 1000px);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .description {
      margin: 0 auto 20px;
      max-width: 720px;
      color: #d4c3aa;
      line-height: 1.5;
    }

    .canvas-frame {
      width: 100%;
      padding: clamp(8px, 1.5vw, 14px);
      overflow: hidden;
      border: 1px solid #967540;
      border-radius: 14px;
      background:
        linear-gradient(
          135deg,
          #34200f,
          #9c7432,
          #3b2511,
          #b18a45,
          #2b190c
        );
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.6),
        inset 0 0 18px rgba(255, 224, 158, 0.15);
    }

    #artCanvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 900 / 620;
      border: 1px solid #2d1b0e;
      border-radius: 6px;
      background: #19130f;
    }

    .controls {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    button {
      min-width: 110px;
      padding: 10px 18px;
      border: 1px solid #b18b50;
      border-radius: 999px;
      color: #fff7e8;
      background: #3e2e20;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition:
        transform 150ms ease,
        background-color 150ms ease,
        border-color 150ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #e2bd79;
      background: #5b432b;
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:focus-visible {
      outline: 3px solid #f0c574;
      outline-offset: 3px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .progress-container {
      width: min(330px, 80vw);
      height: 12px;
      overflow: hidden;
      border: 1px solid #78603c;
      border-radius: 999px;
      background: #17120e;
    }

    #progressBar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(
          90deg,
          #81622c,
          #d8a94f,
          #ffe4a2
        );
    }

    #status {
      min-height: 1.5em;
      margin: 13px 0 0;
      color: #d9c9af;
      font-size: 0.95rem;
    }

    .error {
      color: #ffb4b4 !important;
    }

    noscript {
      display: block;
      margin-top: 16px;
      padding: 14px;
      border-radius: 8px;
      color: #fff;
      background: #7b2424;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .controls {
        gap: 8px;
      }

      button {
        min-width: 94px;
        padding: 9px 13px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>The Portrait Emerges</h1>

    <p class="description">
      A self-contained procedural canvas animation inspired by
      Leonardo da Vinci’s <em>Mona Lisa</em>.
    </p>

    <div class="canvas-frame" id="canvasFrame">
      &lt;canvas
        id="artCanvas"
        width="900"
        height="620"
        aria-label="Animated painting inspired by the Mona Lisa"
      &gt;
        Your browser does not support HTML canvas.
      </canvas>
    </div>

    <div class="controls">
      <button id="pauseButton" type="button">
        Pause
      </button>

      <button id="restartButton" type="button">
        Restart
      </button>

      <button id="finishButton" type="button">
        Show finished
      </button>

      <div
        id="progressContainer"
        class="progress-container"
        role="progressbar"
        aria-label="Painting progress"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
      >
        <div id="progressBar"></div>
      </div>
    </div>

    <p id="status" aria-live="polite">
      Preparing the canvas…
    </p>

    <noscript>
      JavaScript must be enabled to run this animation.
    </noscript>
  </main>

  <!--
    The script is intentionally located after the canvas.
    Therefore, the canvas has already been parsed when this runs.
  -->
  <script>
    "use strict";

    (() => {
      /*
       * ------------------------------------------------------------
       * DOM setup
       * ------------------------------------------------------------
       */

      const WIDTH = 900;
      const HEIGHT = 620;
      const DURATION = 15000;

      const PAINTING = {
        x: 160,
        y: 46,
        width: 580,
        height: 528
      };

      const frameElement =
        document.getElementById("canvasFrame") ||
        document.body;

      /*
       * Try the expected ID first. If an editor changed the ID,
       * use the first canvas. If no canvas exists, create one.
       */
      let canvas =
        document.getElementById("artCanvas") ||
        document.querySelector("canvas");

      if (!(canvas instanceof HTMLCanvasElement)) {
        canvas = document.createElement("canvas");
        canvas.id = "artCanvas";
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        canvas.setAttribute(
          "aria-label",
          "Animated painting inspired by the Mona Lisa"
        );

        frameElement.appendChild(canvas);
      }

      canvas.width = WIDTH;
      canvas.height = HEIGHT;

      const context = canvas.getContext("2d");

      const pauseButton =
        document.getElementById("pauseButton");

      const restartButton =
        document.getElementById("restartButton");

      const finishButton =
        document.getElementById("finishButton");

      const progressBar =
        document.getElementById("progressBar");

      const progressContainer =
        document.getElementById("progressContainer");

      const statusElement =
        document.getElementById("status");

      if (!context) {
        if (statusElement) {
          statusElement.textContent =
            "Canvas 2D is unavailable in this browser.";
          statusElement.classList.add("error");
        }

        console.error(
          "Unable to create the Canvas 2D rendering context."
        );

        return;
      }

      /*
       * Offscreen canvases:
       * - finalCanvas contains the finished portrait.
       * - paintCanvas accumulates the animated brush strokes.
       */
      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = WIDTH;
      finalCanvas.height = HEIGHT;

      const finalContext =
        finalCanvas.getContext("2d");

      const paintCanvas = document.createElement("canvas");
      paintCanvas.width = WIDTH;
      paintCanvas.height = HEIGHT;

      const paintContext =
        paintCanvas.getContext("2d");

      if (!finalContext || !paintContext) {
        if (statusElement) {
          statusElement.textContent =
            "Unable to create the painting layers.";
          statusElement.classList.add("error");
        }

        return;
      }

      /*
       * ------------------------------------------------------------
       * Utility functions
       * ------------------------------------------------------------
       */

      function clamp(value, minimum, maximum) {
        return Math.max(
          minimum,
          Math.min(maximum, value)
        );
      }

      function smoothStep(value) {
        const amount = clamp(value, 0, 1);

        return (
          amount *
          amount *
          (3 - 2 * amount)
        );
      }

      function ellipse(
        drawingContext,
        x,
        y,
        radiusX,
        radiusY,
        color,
        rotation = 0
      ) {
        drawingContext.beginPath();

        drawingContext.ellipse(
          x,
          y,
          radiusX,
          radiusY,
          rotation,
          0,
          Math.PI * 2
        );

        drawingContext.fillStyle = color;
        drawingContext.fill();
      }

      function line(
        drawingContext,
        points,
        color,
        lineWidth = 1
      ) {
        if (points.length < 2) {
          return;
        }

        drawingContext.beginPath();
        drawingContext.moveTo(
          points[0](0)[0](0),
          points[0](0)[1](1)
        );

        for (
          let index = 1;
          index < points.length;
          index++
        ) {
          drawingContext.lineTo(
            points[index][0](0),
            points[index][1](1)
          );
        }

        drawingContext.strokeStyle = color;
        drawingContext.lineWidth = lineWidth;
        drawingContext.stroke();
      }

      function setProgress(value) {
        const percent = Math.round(
          clamp(value, 0, 1) * 100
        );

        if (progressBar) {
          progressBar.style.width = `${percent}%`;
        }

        if (progressContainer) {
          progressContainer.setAttribute(
            "aria-valuenow",
            String(percent)
          );
        }
      }

      function setStatus(message, error = false) {
        if (!statusElement) {
          return;
        }

        statusElement.textContent = message;
        statusElement.classList.toggle(
          "error",
          error
        );
      }

      /*
       * ------------------------------------------------------------
       * Static gallery and picture frame
       * ------------------------------------------------------------
       */

      function drawGallery(drawingContext) {
        const background =
          drawingContext.createRadialGradient(
            WIDTH / 2,
            190,
            80,
            WIDTH / 2,
            HEIGHT / 2,
            650
          );

        background.addColorStop(
          0,
          "#4c4035"
        );

        background.addColorStop(
          0.5,
          "#251e19"
        );

        background.addColorStop(
          1,
          "#0d0b0a"
        );

        drawingContext.fillStyle = background;

        drawingContext.fillRect(
          0,
          0,
          WIDTH,
          HEIGHT
        );

        const floor =
          drawingContext.createLinearGradient(
            0,
            430,
            0,
            HEIGHT
          );

        floor.addColorStop(
          0,
          "rgba(78, 57, 39, 0)"
        );

        floor.addColorStop(
          1,
          "rgba(8, 6, 5, 0.85)"
        );

        drawingContext.fillStyle = floor;

        drawingContext.fillRect(
          0,
          420,
          WIDTH,
          HEIGHT - 420
        );
      }

      function drawFrame(drawingContext) {
        drawingContext.save();

        drawingContext.shadowColor =
          "rgba(0, 0, 0, 0.75)";

        drawingContext.shadowBlur = 28;
        drawingContext.shadowOffsetY = 14;

        const outerFrame =
          drawingContext.createLinearGradient(
            110,
            20,
            790,
            600
          );

        outerFrame.addColorStop(
          0,
          "#3a220f"
        );

        outerFrame.addColorStop(
          0.22,
          "#b68a3b"
        );

        outerFrame.addColorStop(
          0.5,
          "#4a2b13"
        );

        outerFrame.addColorStop(
          0.78,
          "#c4994a"
        );

        outerFrame.addColorStop(
          1,
          "#29170b"
        );

        drawingContext.fillStyle = outerFrame;

        drawingContext.fillRect(
          118,
          12,
          664,
          596
        );

        drawingContext.restore();

        drawingContext.strokeStyle = "#e0b960";
        drawingContext.lineWidth = 4;

        drawingContext.strokeRect(
          127,
          21,
          646,
          578
        );

        drawingContext.strokeStyle = "#37200e";
        drawingContext.lineWidth = 12;

        drawingContext.strokeRect(
          143,
          36,
          614,
          548
        );

        const paper =
          drawingContext.createRadialGradient(
            450,
            270,
            80,
            450,
            300,
            420
          );

        paper.addColorStop(
          0,
          "#d0b98d"
        );

        paper.addColorStop(
          0.65,
          "#a88b61"
        );

        paper.addColorStop(
          1,
          "#705535"
        );

        drawingContext.fillStyle = paper;

        drawingContext.fillRect(
          PAINTING.x,
          PAINTING.y,
          PAINTING.width,
          PAINTING.height
        );

        drawingContext.save();

        drawingContext.beginPath();

        drawingContext.rect(
          PAINTING.x,
          PAINTING.y,
          PAINTING.width,
          PAINTING.height
        );

        drawingContext.clip();
        drawingContext.globalAlpha = 0.08;

        for (
          let index = 0;
          index < 180;
          index++
        ) {
          const x =
            PAINTING.x +
            ((index * 79) % PAINTING.width);

          const y =
            PAINTING.y +
            ((index * 47) % PAINTING.height);

          ellipse(
            drawingContext,
            x,
            y,
            1 + (index % 3),
            1,
            "#3b2918"
          );
        }

        drawingContext.restore();
      }

      function drawBase(drawingContext) {
        drawingContext.clearRect(
          0,
          0,
          WIDTH,
          HEIGHT
        );

        drawGallery(drawingContext);
        drawFrame(drawingContext);
      }

      /*
       * ------------------------------------------------------------
       * Finished portrait
       * ------------------------------------------------------------
       */

      function drawLandscape(drawingContext) {
        const sky =
          drawingContext.createLinearGradient(
            0,
            PAINTING.y,
            0,
            370
          );

        sky.addColorStop(
          0,
          "#687b6c"
        );

        sky.addColorStop(
          0.45,
          "#a69a70"
        );

        sky.addColorStop(
          1,
          "#59624c"
        );

        drawingContext.fillStyle = sky;

        drawingContext.fillRect(
          PAINTING.x,
          PAINTING.y,
          PAINTING.width,
          PAINTING.height
        );

        drawingContext.beginPath();
        drawingContext.moveTo(160, 270);
        drawingContext.lineTo(215, 184);
        drawingContext.lineTo(278, 237);
        drawingContext.lineTo(340, 145);
        drawingContext.lineTo(402, 224);
        drawingContext.lineTo(465, 156);
        drawingContext.lineTo(530, 230);
        drawingContext.lineTo(604, 137);
        drawingContext.lineTo(672, 220);
        drawingContext.lineTo(740, 164);
        drawingContext.lineTo(740, 355);
        drawingContext.lineTo(160, 355);
        drawingContext.closePath();

        drawingContext.fillStyle = "#586452";
        drawingContext.fill();

        drawingContext.beginPath();
        drawingContext.moveTo(160, 310);
        drawingContext.lineTo(222, 226);
        drawingContext.lineTo(284, 269);
        drawingContext.lineTo(344, 193);
        drawingContext.lineTo(408, 265);
        drawingContext.lineTo(471, 198);
        drawingContext.lineTo(535, 270);
        drawingContext.lineTo(609, 181);
        drawingContext.lineTo(680, 258);
        drawingContext.lineTo(740, 204);
        drawingContext.lineTo(740, 390);
        drawingContext.lineTo(160, 390);
        drawingContext.closePath();

        drawingContext.fillStyle =
          "rgba(154, 151, 107, 0.64)";

        drawingContext.fill();

        drawingContext.beginPath();
        drawingContext.moveTo(160, 370);

        drawingContext.bezierCurveTo(
          238,
          323,
          285,
          408,
          371,
          368
        );

        drawingContext.bezierCurveTo(
          465,
          323,
          522,
          411,
          612,
          365
        );

        drawingContext.bezierCurveTo(
          676,
          332,
          709,
          350,
          740,
          327
        );

        drawingContext.strokeStyle = "#7d886e";
        drawingContext.lineWidth = 19;
        drawingContext.stroke();

        drawingContext.beginPath();
        drawingContext.moveTo(160, 373);

        drawingContext.bezierCurveTo(
          238,
          329,
          287,
          413,
          373,
          374
        );

        drawingContext.bezierCurveTo(
          466,
          332,
          527,
          417,
          615,
          371
        );

        drawingContext.bezierCurveTo(
          678,
          340,
          711,
          357,
          740,
          337
        );

        drawingContext.strokeStyle =
          "rgba(216, 203, 144, 0.45)";

        drawingContext.lineWidth = 5;
        drawingContext.stroke();

        const ground =
          drawingContext.createLinearGradient(
            0,
            350,
            0,
            PAINTING.y + PAINTING.height
          );

        ground.addColorStop(
          0,
          "rgba(49, 67, 50, 0)"
        );

        ground.addColorStop(
          1,
          "#263429"
        );

        drawingContext.fillStyle = ground;

        drawingContext.fillRect(
          PAINTING.x,
          345,
          PAINTING.width,
          230
        );
      }

      function drawBody(drawingContext) {
        const dress =
          drawingContext.createLinearGradient(
            305,
            330,
            610,
            575
          );

        dress.addColorStop(
          0,
          "#25271d"
        );

        dress.addColorStop(
          0.5,
          "#514d33"
        );

        dress.addColorStop(
          1,
          "#151711"
        );

        drawingContext.beginPath();
        drawingContext.moveTo(368, 329);

        drawingContext.bezierCurveTo(
          305,
          351,
          275,
          444,
          250,
          574
        );

        drawingContext.lineTo(652, 574);

        drawingContext.bezierCurveTo(
          630,
          444,
          593,
          351,
          529,
          329
        );

        drawingContext.closePath();
        drawingContext.fillStyle = dress;
        drawingContext.fill();

        drawingContext.beginPath();
        drawingContext.moveTo(367, 326);

        drawingContext.bezierCurveTo(
          405,
          363,
          493,
          364,
          531,
          326
        );

        drawingContext.lineTo(551, 371);

        drawingContext.bezierCurveTo(
          501,
          411,
          398,
          409,
          346,
          369
        );

        drawingContext.closePath();
        drawingContext.fillStyle = "#68613f";
        drawingContext.fill();

        drawingContext.strokeStyle =
          "rgba(202, 184, 117, 0.24)";

        drawingContext.lineWidth = 2;

        for (
          let index = 0;
          index < 11;
          index++
        ) {
          drawingContext.beginPath();

          drawingContext.moveTo(
            324 + index * 25,
            388
          );

          drawingContext.bezierCurveTo(
            303 + index * 27,
            452,
            302 + index * 29,
            520,
            295 + index * 33,
            574
          );

          drawingContext.stroke();
        }
      }

      function drawHair(drawingContext) {
        const hair =
          drawingContext.createRadialGradient(
            448,
            218,
            30,
            450,
            280,
            210
          );

        hair.addColorStop(
          0,
          "#513927"
        );

        hair.addColorStop(
          0.52,
          "#261b15"
        );

        hair.addColorStop(
          1,
          "#0e0c0a"
        );

        drawingContext.beginPath();
        drawingContext.moveTo(340, 433);

        drawingContext.bezierCurveTo(
          312,
          344,
          324,
          215,
          369,
          158
        );

        drawingContext.bezierCurveTo(
          410,
          108,
          493,
          106,
          535,
          159
        );

        drawingContext.bezierCurveTo(
          582,
          221,
          592,
          350,
          558,
          436
        );

        drawingContext.bezierCurveTo(
          514,
          478,
          381,
          479,
          340,
          433
        );

        drawingContext.closePath();
        drawingContext.fillStyle = hair;
        drawingContext.fill();

        drawingContext.lineCap = "round";
        drawingContext.lineWidth = 2;

        for (
          let index = 0;
          index < 20;
          index++
        ) {
          const offset = index * 7;

          drawingContext.beginPath();

          drawingContext.moveTo(
            372 + offset * 0.43,
            166 + (index % 4) * 3
          );

          drawingContext.bezierCurveTo(
            331 + offset * 0.22,
            246 + index * 5,
            347 + offset * 0.36,
            362 + index * 2,
            344 + offset * 0.57,
            433
          );

          drawingContext.strokeStyle =
            index % 3 === 0
              ? "rgba(154, 111, 67, 0.28)"
              : "rgba(22, 16, 12, 0.52)";

          drawingContext.stroke();
        }
      }

      function drawNeck(drawingContext) {
        const neck =
          drawingContext.createLinearGradient(
            410,
            300,
            493,
            370
          );

        neck.addColorStop(
          0,
          "#b88a64"
        );

        neck.addColorStop(
          0.55,
          "#997052"
        );

        neck.addColorStop(
          1,
          "#6f4e3b"
        );

        drawingContext.beginPath();
        drawingContext.moveTo(408, 296);
        drawingContext.lineTo(494, 296);
        drawingContext.lineTo(507, 351);

        drawingContext.bezierCurveTo(
          480,
          374,
          421,
          374,
          394,
          350
        );

        drawingContext.closePath();
        drawingContext.fillStyle = neck;
        drawingContext.fill();
      }

      function drawFace(drawingContext) {
        const skin =
          drawingContext.createRadialGradient(
            426,
            216,
            14,
            458,
            265,
            145
          );

        skin.addColorStop(
          0,
          "#d7b287"
        );

        skin.addColorStop(
          0.45,
          "#bb916b"
        );

        skin.addColorStop(
          0.82,
          "#8c654c"
        );

        skin.addColorStop(
          1,
          "#624536"
        );

        drawingContext.beginPath();
        drawingContext.moveTo(383, 178);

        drawingContext.bezierCurveTo(
          407,
          139,
          486,
          138,
          515,
          180
        );

        drawingContext.bezierCurveTo(
          536,
          217,
          523,
          294,
          496,
          328
        );

        drawingContext.bezierCurveTo(
          475,
          355,
          429,
          358,
          402,
          329
        );

        drawingContext.bezierCurveTo(
          374,
          297,
          360,
          218,
          383,
          178
        );

        drawingContext.closePath();
        drawingContext.fillStyle = skin;
        drawingContext.fill();

        ellipse(
          drawingContext,
          389,
          254,
          15,
          62,
          "rgba(71, 46, 34, 0.20)"
        );

        ellipse(
          drawingContext,
          507,
          253,
          13,
          61,
          "rgba(68, 43, 33, 0.23)"
        );

        ellipse(
          drawingContext,
          457,
          311,
          44,
          22,
          "rgba(92, 54, 42, 0.12)"
        );

        // Eyebrows
        drawingContext.lineCap = "round";
        drawingContext.lineWidth = 5;
        drawingContext.strokeStyle =
          "rgba(57, 38, 29, 0.54)";

        drawingContext.beginPath();
        drawingContext.moveTo(398, 219);

        drawingContext.quadraticCurveTo(
          420,

      /*
       * ------------------------------------------------------------
       * Brush stroke animation
       * ------------------------------------------------------------
       */

      function createBrushRoute() {
        const route = [];
        const spacingX = 19;
        const spacingY = 17;

        let rowIndex = 0;

        for (
          let y = PAINTING.y + 5;
          y <= PAINTING.y + PAINTING.height - 5;
          y += spacingY
        ) {
          const row = [];

          for (
            let x = PAINTING.x + 5;
            x <= PAINTING.x + PAINTING.width - 5;
            x += spacingX
          ) {
            row.push({
              x:
                x +
                Math.sin(
                  x * 0.06 +
                  y * 0.04
                ) * 4,

              y:
                y +
                Math.cos(
                  x * 0.05 +
                  y * 0.07
                ) * 3,

              radius:
                22 +
                ((x + y) % 7),

              rotation:
                Math.sin(
                  x * 0.025 +
                  y * 0.012
                ) * 0.5
            });
          }

          if (rowIndex % 2 === 1) {
            row.reverse();
          }

          route.push(...row);
          rowIndex++;
        }

        return route;
      }

      const brushRoute =
        createBrushRoute();

      let paintedStrokeCount = 0;

      let brushPosition = {
        x: PAINTING.x,
        y: PAINTING.y
      };

      let previousBrushPosition = {
        ...brushPosition
      };

      function applyPaintStroke(stroke) {
        paintContext.save();

        paintContext.beginPath();

        paintContext.ellipse(
          stroke.x,
          stroke.y,
          stroke.radius * 1.45,
          stroke.radius * 0.72,
          stroke.rotation,
          0,
          Math.PI * 2
        );

        paintContext.clip();
        paintContext.globalAlpha = 0.95;

        paintContext.drawImage(
          finalCanvas,
          0,
          0
        );

        paintContext.restore();

        /*
         * Add faint parallel bristle marks.
         */
        paintContext.save();

        paintContext.beginPath();

        paintContext.rect(
          PAINTING.x,
          PAINTING.y,
          PAINTING.width,
          PAINTING.height
        );

        paintContext.clip();
        paintContext.globalAlpha = 0.11;
        paintContext.strokeStyle = "#f0d7a3";
        paintContext.lineWidth = 1;

        for (
          let offset = -2;
          offset <= 2;
          offset++
        ) {
          paintContext.beginPath();

          paintContext.moveTo(
            stroke.x - stroke.radius,
            stroke.y + offset * 4
          );

          paintContext.lineTo(
            stroke.x + stroke.radius,
            stroke.y +
              offset * 4 +
              Math.sin(stroke.x) * 2
          );

          paintContext.stroke();
        }

        paintContext.restore();
      }

      function updatePainting(progress) {
        const easedProgress =
          smoothStep(progress);

        const targetStrokeCount =
          Math.floor(
            easedProgress *
            brushRoute.length
          );

        while (
          paintedStrokeCount <
          targetStrokeCount
        ) {
          const stroke =
            brushRoute[paintedStrokeCount];

          previousBrushPosition = {
            ...brushPosition
          };

          brushPosition = {
            x: stroke.x,
            y: stroke.y
          };

          applyPaintStroke(stroke);
          paintedStrokeCount++;

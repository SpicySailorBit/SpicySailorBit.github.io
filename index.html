<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planer Trasy Kuriera</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
        #map { width: 100%; height: 100vh; z-index: 1; }
        
        #ui-panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 300px;
        }
        #ui-panel h3 { margin-top: 0; }
        #address-input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        
        button {
            width: 100%; padding: 10px; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px;
        }
        .btn-primary { background-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .btn-warning { background-color: #ffc107; color: #212529; }
        .btn-warning:hover { background-color: #e0a800; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }
        
        #points-list { margin-top: 15px; padding-left: 20px; font-size: 14px; }
        hr { border: 0; height: 1px; background: #ddd; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h3>Dodaj punkt</h3>
        <input type="text" id="address-input" placeholder="np. Wawel 5, Kraków">
        <button class="btn-primary" onclick="addAddress()">Znajdź i dodaj</button>
        
        <button class="btn-success" onclick="optimizeRoute()">Wyznacz trasę</button>
        
        <hr>
        
        <button id="track-btn" class="btn-warning" onclick="toggleTracking()">📍 Rozpocznij śledzenie GPS</button>
        
        <h4>Lista adresów:</h4>
        <ul id="points-list"></ul>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const map = L.map('map').setView([51.9194, 19.1451], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let deliveryPoints = [];
        let routeLayer = null; 

        // Zmienne dla GPS
        let trackingId = null;
        let courierMarker = null;

        async function addAddress() {
            const address = document.getElementById('address-input').value;
            if (!address) return;
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    const displayName = data[0].display_name;
                    L.marker([lat, lon]).addTo(map).bindPopup(displayName);
                    map.setView([lat, lon], 13);
                    deliveryPoints.push({ lat: lat, lon: lon, name: displayName });
                    updateListUI();
                    document.getElementById('address-input').value = '';
                } else {
                    alert("Nie udało się znaleźć adresu.");
                }
            } catch (error) {
                console.error("Błąd API:", error);
                alert("Wystąpił problem z połączeniem.");
            }
        }

        function updateListUI() {
            const listElement = document.getElementById('points-list');
            listElement.innerHTML = ''; 
            deliveryPoints.forEach((point, index) => {
                const li = document.createElement('li');
                const shortName = point.name.split(',')[0] + ', ' + point.name.split(',')[1];
                li.innerText = `${index === 0 ? '[BAZA] ' : ''}${shortName}`;
                listElement.appendChild(li);
            });
        }

        async function optimizeRoute() {
            if (deliveryPoints.length < 2) {
                alert("Musisz dodać co najmniej 2 punkty!");
                return;
            }
            const coordinatesString = deliveryPoints.map(p => `${p.lon},${p.lat}`).join(';');
            const osrmUrl = `https://router.project-osrm.org/trip/v1/driving/${coordinatesString}?source=first&roundtrip=true&overview=full&geometries=geojson`;
            try {
                const response = await fetch(osrmUrl);
                const data = await response.json();
                if (data.code === 'Ok') {
                    if (routeLayer) map.removeLayer(routeLayer);
                    routeLayer = L.geoJSON(data.trips[0].geometry, {
                        style: { color: '#007bff', weight: 5, opacity: 0.7 }
                    }).addTo(map);
                    map.fitBounds(routeLayer.getBounds());
                } else {
                    alert("Nie udało się wyznaczyć trasy.");
                }
            } catch (error) {
                console.error("Błąd routingu:", error);
            }
        }

        // 5. NOWA FUNKCJA: Obsługa GPS
        function toggleTracking() {
            if (!navigator.geolocation) {
                alert("Twoja przeglądarka nie obsługuje geolokalizacji.");
                return;
            }

            const btn = document.getElementById('track-btn');

            if (trackingId) {
                // Jeśli śledzenie jest włączone, wyłączamy je
                navigator.geolocation.clearWatch(trackingId);
                trackingId = null;
                if (courierMarker) {
                    map.removeLayer(courierMarker);
                    courierMarker = null;
                }
                btn.innerText = "📍 Rozpocznij śledzenie GPS";
                btn.className = "btn-warning";
            } else {
                // Włączamy śledzenie
                btn.innerText = "⏹ Zakończ śledzenie";
                btn.className = "btn-danger";

                // Opcje: wysoka dokładność pobiera dane prosto z modułu satelitarnego GPS (dobre dla telefonów)
                const options = { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 };

                trackingId = navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;

                        if (!courierMarker) {
                            // Rysujemy pozycję kuriera jako czerwone kółko z pulsującym wyglądem
                            courierMarker = L.circleMarker([lat, lon], {
                                color: '#dc3545',
                                fillColor: '#dc3545',
                                fillOpacity: 1,
                                radius: 8
                            }).addTo(map);
                            map.setView([lat, lon], 16);
                        } else {
                            // Kurier się poruszył - przesuwamy kółko
                            courierMarker.setLatLng([lat, lon]);
                        }
                    },
                    (error) => {
                        console.error("Błąd GPS:", error);
                        alert("Brak dostępu do lokalizacji. Zezwól stronie na używanie GPS w ustawieniach przeglądarki.");
                        // Reset przycisku w razie błędu
                        navigator.geolocation.clearWatch(trackingId);
                        trackingId = null;
                        btn.innerText = "📍 Rozpocznij śledzenie GPS";
                        btn.className = "btn-warning";
                    },
                    options
                );
            }
        }
    </script>
</body>
</html>

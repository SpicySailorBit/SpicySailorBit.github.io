<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Artist — Mona Lisa Study</title>
<style>
  :root {
    color-scheme: dark;
    --gold: #c8a96a;
    --panel: rgba(23, 19, 15, 0.86);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
  }

  body {
    display: grid;
    place-items: center;
    overflow-x: hidden;
    font-family: Georgia, "Times New Roman", serif;
    color: #eee7dc;
    background:
      radial-gradient(circle at 50% 30%, #353129 0%, #171512 48%, #090807 100%);
  }

  .experience {
    width: min(96vw, 1120px);
    padding: 20px;
  }

  .heading {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 12px;
  }

  .title {
    margin: 0;
    font-weight: 400;
    font-size: clamp(1.25rem, 3vw, 2rem);
    letter-spacing: 0.08em;
  }

  .subtitle {
    margin: 4px 0 0;
    color: #b8aa96;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .stage {
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(211, 181, 125, 0.25);
    border-radius: 8px;
    background: #17130f;
    box-shadow:
      0 30px 90px rgba(0, 0, 0, 0.58),
      inset 0 0 0 1px rgba(255, 255, 255, 0.025);
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 900 / 620;
    touch-action: manipulation;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }

  button {
    appearance: none;
    min-width: 94px;
    padding: 9px 15px;
    border: 1px solid rgba(211, 181, 125, 0.42);
    border-radius: 999px;
    color: #eee7dc;
    font: inherit;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    background: var(--panel);
    cursor: pointer;
    transition: background 160ms ease, border-color 160ms ease;
  }

  button:hover {
    border-color: var(--gold);
    background: rgba(56, 45, 32, 0.95);
  }

  button:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  .progress-track {
    position: relative;
    flex: 1;
    height: 3px;
    overflow: hidden;
    border-radius: 99px;
    background: rgba(255, 255, 255, 0.1);
  }

  .progress-bar {
    width: 0;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #8b7041, #ddc58d);
    box-shadow: 0 0 12px rgba(220, 190, 125, 0.45);
  }

  .status {
    min-width: 132px;
    color: #b8aa96;
    font-size: 0.78rem;
    text-align: right;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @media (max-width: 620px) {
    .experience {
      padding: 10px;
    }

    .heading {
      align-items: start;
      flex-direction: column;
    }

    .status {
      display: none;
    }

    button {
      min-width: 80px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .subtitle::after {
      content: " · Reduced-motion mode";
    }
  }
</style>
</head>
<body>
<main class="experience">
  <div class="heading">
    <div>
      <h1 class="title">The Artist</h1>
      <p class="subtitle">A procedural Mona Lisa study</p>
    </div>
  </div>

  <section class="stage" aria-label="Animated artist drawing a Mona Lisa portrait">
    &lt;canvas id="canvas" width="900" height="620"&gt;
      Your browser does not support HTML canvas.
    </canvas>
  </section>

  <div class="controls">
    <button id="pauseButton" type="button">Pause</button>
    <button id="restartButton" type="button">Restart</button>
    <div class="progress-track" aria-hidden="true">
      <div id="progressBar" class="progress-bar"></div>
    </div>
    <div id="status" class="status" aria-live="polite">Underdrawing</div>
  </div>
</main>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const pauseButton = document.getElementById("pauseButton");
  const restartButton = document.getElementById("restartButton");
  const progressBar = document.getElementById("progressBar");
  const statusElement = document.getElementById("status");

  const W = 900;
  const H = 620;

  const ART = {
    x: 195,
    y: 42,
    w: 420,
    h: 530
  };

  const DURATION = 19000;
  const HOLD_DURATION = 3500;
  const REDUCED_MOTION = matchMedia("(prefers-reduced-motion: reduce)").matches;

  const portraitCanvas = document.createElement("canvas");
  const portraitCtx = portraitCanvas.getContext("2d");
  portraitCanvas.width = ART.w;
  portraitCanvas.height = ART.h;

  const maskCanvas = document.createElement("canvas");
  const maskCtx = maskCanvas.getContext("2d");
  maskCanvas.width = ART.w;
  maskCanvas.height = ART.h;

  const revealCanvas = document.createElement("canvas");
  const revealCtx = revealCanvas.getContext("2d");
  revealCanvas.width = ART.w;
  revealCanvas.height = ART.h;

  let trajectory = [];
  let lastTrajectoryIndex = -1;
  let startTime = performance.now();
  let pausedAt = 0;
  let paused = false;
  let lastCycle = 0;

  function resizeCanvas() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function path(context, points, close = true) {
    context.beginPath();

    for (const command of points) {
      const [type, ...v] = command;

      if (type === "M") context.moveTo(v[0](0), v[1](1));
      if (type === "L") context.lineTo(v[0](0), v[1](1));
      if (type === "C") {
        context.bezierCurveTo(
          v[0](0), v[1](1), v[2](2), v[3](3), v[4](4), v[5](5)
        );
      }
      if (type === "Q") {
        context.quadraticCurveTo(v[0](0), v[1](1), v[2](2), v[3](3));
      }
    }

    if (close) context.closePath();
  }

  function ellipse(context, x, y, rx, ry, color, rotation = 0) {
    context.save();
    context.translate(x, y);
    context.rotate(rotation);
    context.beginPath();
    context.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    context.fillStyle = color;
    context.fill();
    context.restore();
  }

  function makeGradient(context, x0, y0, x1, y1, stops) {
    const gradient = context.createLinearGradient(x0, y0, x1, y1);
    stops.forEach(([position, color]) => gradient.addColorStop(position, color));
    return gradient;
  }

  function seededRandomFactory(seed = 1234567) {
    let state = seed >>> 0;

    return () => {
      state = (state * 1664525 + 1013904223) >>> 0;
      return state / 4294967296;
    };
  }

  function drawPortrait() {
    const c = portraitCtx;
    const w = ART.w;
    const h = ART.h;

    c.clearRect(0, 0, w, h);

    // Atmospheric landscape.
    const sky = c.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, "#7f846d");
    sky.addColorStop(0.28, "#6d725c");
    sky.addColorStop(0.58, "#4e5749");
    sky.addColorStop(1, "#252a22");
    c.fillStyle = sky;
    c.fillRect(0, 0, w, h);

    const glow = c.createRadialGradient(215, 105, 15, 215, 120, 230);
    glow.addColorStop(0, "rgba(211,205,157,0.34)");
    glow.addColorStop(0.45, "rgba(143,146,105,0.12)");
    glow.addColorStop(1, "rgba(22,26,22,0)");
    c.fillStyle = glow;
    c.fillRect(0, 0, w, 300);

    // Distant mountains.
    path(c, [
      ["M", 0, 160],
      ["C", 45, 115, 80, 144, 122, 106],
      ["C", 162, 68, 201, 146, 245, 105],
      ["C", 290, 65, 326, 129, 420, 82],
      ["L", 420, 245],
      ["L", 0, 245]
    ]);
    c.fillStyle = "#4c5549";
    c.fill();

    path(c, [
      ["M", 0, 198],
      ["C", 62, 147, 102, 192, 157, 146],
      ["C", 215, 102, 246, 183, 304, 139],
      ["C", 354, 103, 382, 150, 420, 123],
      ["L", 420, 285],
      ["L", 0, 285]
    ]);
    c.fillStyle = "#3c473e";
    c.fill();

    // Winding river and road.
    path(c, [
      ["M", 326, 95],
      ["C", 289, 144, 363, 156, 322, 201],
      ["C", 295, 230, 324, 252, 278, 288]
    ], false);
    c.strokeStyle = "rgba(177,181,146,0.50)";
    c.lineWidth = 5;
    c.stroke();

    path(c, [
      ["M", 42, 115],
      ["C", 77, 150, 30, 174, 78, 215],
      ["C", 101, 237, 64, 267, 121, 303]
    ], false);
    c.strokeStyle = "rgba(175,166,123,0.36)";
    c.lineWidth = 3;
    c.stroke();

    // Low landscape haze.
    const haze = c.createLinearGradient(0, 180, 0, 330);
    haze.addColorStop(0, "rgba(156,159,125,0)");
    haze.addColorStop(0.5, "rgba(152,153,116,0.13)");
    haze.addColorStop(1, "rgba(25,29,23,0)");
    c.fillStyle = haze;
    c.fillRect(0, 130, w, 210);

    // Dark seated silhouette.
    path(c, [
      ["M", 116, 299],
      ["C", 76, 328, 57, 390, 40, 530],
      ["L", 382, 530],
      ["C", 365, 414, 342, 331, 299, 300],
      ["C", 258, 270, 158, 272, 116, 299]
    ]);
    c.fillStyle = makeGradient(c, 60, 300, 350, 510, [
      [0, "#25271e"],
      [0.38, "#121710"],
      [0.72, "#090d09"],
      [1, "#1b2118"]
    ]);
    c.fill();

    // Shoulders and sleeves.
    path(c, [
      ["M", 111, 304],
      ["C", 74, 325, 60, 391, 55, 479],
      ["C", 103, 458, 132, 428, 160, 379],
      ["C", 172, 347, 159, 316, 111, 304]
    ]);
    c.fillStyle = "#161b13";
    c.fill();

    path(c, [
      ["M", 299, 303],
      ["C", 348, 335, 362, 403, 368, 492],
      ["C", 318, 456, 289, 418, 264, 374],
      ["C", 251, 342, 264, 314, 299, 303]
    ]);
    c.fillStyle = "#121711";
    c.fill();

    // Veil and hair mass.
    path(c, [
      ["M", 124, 87],
      ["C", 84, 117, 79, 180, 95, 240],
      ["C", 106, 280, 85, 314, 112, 350],
      ["C", 139, 326, 152, 301, 165, 284],
      ["C", 190, 307, 249, 310, 276, 281],
      ["C", 291, 309, 308, 331, 331, 350],
      ["C", 355, 299, 329, 269, 335, 220],
      ["C", 343, 153, 317, 102, 285, 78],
      ["C", 242, 46, 166, 48, 124, 87]
    ]);
    c.fillStyle = makeGradient(c, 95, 80, 330, 345, [
      [0, "#29291e"],
      [0.25, "#151811"],
      [0.56, "#302b1e"],
      [0.8, "#12150f"],
      [1, "#25271d"]
    ]);
    c.fill();

    // Transparent veil.
    path(c, [
      ["M", 127, 85],
      ["C", 164, 49, 253, 50, 290, 80],
      ["C", 313, 102, 315, 142, 313, 174],
      ["C", 285, 125, 265, 93, 214, 81],
      ["C", 174, 74, 148, 89, 108, 122],
      ["C", 112, 105, 118, 94, 127, 85]
    ]);
    c.fillStyle = "rgba(46,45,34,0.42)";
    c.fill();

    // Neck.
    path(c, [
      ["M", 171, 247],
      ["C", 176, 280, 166, 299, 150, 312],
      ["C", 182, 337, 247, 340, 280, 309],
      ["C", 255, 293, 250, 273, 255, 240]
    ]);
    c.fillStyle = makeGradient(c, 157, 252, 274, 310, [
      [0, "#886a4d"],
      [0.36, "#b28a62"],
      [0.7, "#8e6849"],
      [1, "#514131"]
    ]);
    c.fill();

    // Face base.
    c.save();
    c.translate(213, 179);
    c.rotate(-0.035);

    const faceGradient = c.createRadialGradient(-18, -35, 10, 0, 0, 118);
    faceGradient.addColorStop(0, "#d4b287");
    faceGradient.addColorStop(0.34, "#c29a70");
    faceGradient.addColorStop(0.68, "#a77d59");
    faceGradient.addColorStop(0.88, "#76563f");
    faceGradient.addColorStop(1, "#3c3229");

    c.beginPath();
    c.moveTo(-75, -80);
    c.bezierCurveTo(-46, -118, 40, -117, 73, -73);
    c.bezierCurveTo(98, -38, 83, 34, 54, 78);
    c.bezierCurveTo(31, 111, -22, 114, -52, 79);
    c.bezierCurveTo(-82, 45, -101, -38, -75, -80);
    c.closePath();
    c.fillStyle = faceGradient;
    c.fill();

    // Left facial shadow.
    const faceShadow = c.createRadialGradient(-74, 0, 4, -49, 3, 78);
    faceShadow.addColorStop(0, "rgba(64,39,30,0.48)");
    faceShadow.addColorStop(0.7, "rgba(80,49,34,0.12)");
    faceShadow.addColorStop(1, "rgba(70,42,31,0)");
    c.fillStyle = faceShadow;
    c.fillRect(-105, -110, 100, 225);

    // Forehead highlight.
    const forehead = c.createRadialGradient(-9, -60, 2, -8, -58, 48);
    forehead.addColorStop(0, "rgba(242,211,166,0.30)");
    forehead.addColorStop(1, "rgba(230,193,147,0)");
    c.fillStyle = forehead;
    c.fillRect(-75, -108, 145, 100);

    // Eye sockets.
    ellipse(c, -36, -17, 31, 13, "rgba(89,59,42,0.25)", -0.05);
    ellipse(c, 35, -18, 29, 12, "rgba(89,59,42,0.23)", 0.04);

    // Eyes.
    path(c, [
      ["M", -60, -18],
      ["C", -45, -28, -26, -27, -11, -17],
      ["C", -28, -11, -47, -10, -60, -18]
    ]);
    c.fillStyle = "#5b4938";
    c.fill();

    path(c, [
      ["M", 11, -18],
      ["C", 26, -27, 46, -27, 61, -17],
      ["C", 45, -11, 27, -11, 11, -18]
    ]);
    c.fillStyle = "#584735";
    c.fill();

    ellipse(c, -34, -18, 5.2, 5.7, "#27261d");
    ellipse(c, 35, -18, 5.2, 5.7, "#25251d");
    ellipse(c, -32.5, -20, 1.4, 1.5, "rgba(235,219,174,0.72)");
    ellipse(c, 36.5, -20, 1.4, 1.5, "rgba(235,219,174,0.72)");

    // Soft brow lines.
    path(c, [
      ["M", -62, -41],
      ["C", -45, -50, -25, -49, -10, -41]
    ], false);
    c.strokeStyle = "rgba(67,47,35,0.34)";
    c.lineWidth = 3;
    c.stroke();

    path(c, [
      ["M", 10, -42],
      ["C", 27, -49, 48, -48, 61, -39]
    ], false);
    c.stroke();

    // Nose modeling.
    path(c, [
      ["M", 0, -27],
      ["C", -8, 1, -9, 20, -19, 39],
      ["C", -8, 48, 15, 49, 25, 38]
    ], false);
    c.strokeStyle = "rgba(86,56,39,0.35)";
    c.lineWidth = 2.2;
    c.stroke();

    path(c, [
      ["M", -15, 39],
      ["C", -8, 45, -2, 45, 3, 42]
    ], false);
    c.strokeStyle = "rgba(68,44,33,0.45)";
    c.lineWidth = 1.3;
    c.stroke();

    // The restrained smile.
    path(c, [
      ["M", -39, 67],
      ["C", -19, 60, -4, 65, 1, 66],
      ["C", 12, 63, 25, 61, 40, 66],
      ["C", 22, 78, -17, 80, -39, 67]
    ]);
    c.fillStyle = "rgba(103,55,45,0.52)";
    c.fill();

    path(c, [
      ["M", -34, 67],
      ["C", -16, 70, 13, 70, 35, 66]
    ], false);
    c.strokeStyle = "rgba(59,38,31,0.62)";
    c.lineWidth = 1.5;
    c.stroke();

    path(c, [
      ["M", -29, 73],
      ["C", -9, 82, 17, 78, 31, 70]
    ], false);
    c.strokeStyle = "rgba(199,135,103,0.22)";
    c.lineWidth = 2;
    c.stroke();

    // Chin highlight.
    ellipse(c, 2, 91, 31, 13, "rgba(219,176,129,0.14)");

    c.restore();

    // Hair strands.
    c.save();
    c.lineCap = "round";

    const hairLines = [
      [119](119)[101](101)[88](88)[185](185)[131](131)[272](272)[108](108)[331](331),
      [139](139)[83](83)[104](104)[171](171)[151](151)[264](264)[121](121)[321](321),
      [287](287)[92](92)[329](329)[168](168)[286](286)[263](263)[320](320)[327](327),
      [269](269)[76](76)[307](307)[150](150)[275](275)[236](236)[307](307)[309](309),
      [102](102)[142](142)[127](127)[207](207)[104](104)[269](269)[129](129)[313](313),
      [307](307)[126](126)[285](285)[187](187)[316](316)[248](248)[294](294)[302](302)
    ];

    hairLines.forEach((line, index) => {
      c.beginPath();
      c.moveTo(line[0](0), line[1](1));
      c.bezierCurveTo(
        line[2](2), line[3](3),
        line[4](4), line[5](5),
        line[6](6), line[7](7)
      );
      c.strokeStyle = index % 2
        ? "rgba(107,87,55,0.20)"
        : "rgba(185,153,91,0.10)";
      c.lineWidth = index % 2 ? 2.2 : 1.2;
      c.stroke();
    });

    c.restore();

    // Neckline embroidery.
    path(c, [
      ["M", 145, 308],
      ["C", 183, 340, 246, 342, 284, 307]
    ], false);
    c.strokeStyle = "#786440";
    c.lineWidth = 6;
    c.stroke();

    path(c, [
      ["M", 148, 307],
      ["C", 185, 331, 244, 334, 281, 307]
    ], false);
    c.strokeStyle = "rgba(192,166,102,0.52)";
    c.lineWidth = 1.5;
    c.stroke();

    // Sleeves beneath hands.
    path(c, [
      ["M", 66, 405],
      ["C", 116, 382, 165, 390, 214, 423],
      ["C", 193, 461, 139, 477, 72, 466]
    ]);
    c.fillStyle = "#1c2118";
    c.fill();

    path(c, [
      ["M", 337, 400],
      ["C", 289, 383, 251, 397, 207, 430],
      ["C", 229, 467, 284, 483, 351, 461]
    ]);
    c.fillStyle = "#171c15";
    c.fill();

    // Lower arm.
    path(c, [
      ["M", 119, 395],
      ["C", 155, 392, 218, 420, 274, 449],
      ["C", 288, 457, 286, 479, 268, 485],
      ["C", 224, 481, 170, 459, 111, 433],
      ["C", 92, 424, 96, 401, 119, 395]
    ]);
    c.fillStyle = makeGradient(c, 100, 398, 281, 480, [
      [0, "#886345"],
      [0.38, "#ba8c61"],
      [0.7, "#9b704d"],
      [1, "#604a38"]
    ]);
    c.fill();

    // Upper hand.
    path(c, [
      ["M", 244, 407],
      ["C", 270, 390, 298, 393, 324, 411],
      ["C", 339, 421, 339, 438, 322, 445],
      ["C", 292, 454, 259, 453, 226, 449],
      ["C", 204, 447, 191, 434, 198, 422],
      ["C", 208, 414, 227, 414, 244, 407]
    ]);
    c.fillStyle = makeGradient(c, 197, 403, 338, 454, [
      [0, "#c39a6e"],
      [0.45, "#b1845d"],
      [0.78, "#8b6246"],
      [1, "#4f3c31"]
    ]);
    c.fill();

    // Fingers.
    const fingerColor = "rgba(92,59,42,0.38)";
    [
      [225](225)[422](422)[320](320)[424](424),
      [220](220)[430](430)[315](315)[433](433),
      [222](222)[438](438)[304](304)[442](442),
      [239](239)[446](446)[289](289)[450](450)
    ].forEach(([x1, y1, x2, y2]) => {
      c.beginPath();
      c.moveTo(x1, y1);
      c.quadraticCurveTo((x1 + x2) / 2, y1 - 3, x2, y2);
      c.strokeStyle = fingerColor;
      c.lineWidth = 1.2;
      c.stroke();
    });

    // Balustrade.
    const ledge = c.createLinearGradient(0, 480, 0, 530);
    ledge.addColorStop(0, "rgba(88,78,57,0.32)");
    ledge.addColorStop(1, "rgba(25,25,20,0.52)");
    c.fillStyle = ledge;
    c.fillRect(0, 489, w, 41);

    // Vignette.
    const vignette = c.createRadialGradient(
      w / 2, h * 0.42, 110,
      w / 2, h * 0.45, 360
    );
    vignette.addColorStop(0.45, "rgba(0,0,0,0)");
    vignette.addColorStop(1, "rgba(7,8,5,0.58)");
    c.fillStyle = vignette;
    c.fillRect(0, 0, w, h);

    // Fine age and pigment texture.
    const random = seededRandomFactory(4201519);
    c.save();

    for (let i = 0; i < 10500; i++) {
      const x = random() * w;
      const y = random() * h;
      const light = random() > 0.52;
      const alpha = 0.015 + random() * 0.035;
      const size = random() * 1.35 + 0.18;

      c.fillStyle = light
        ? `rgba(239,218,166,${alpha})`
        : `rgba(29,23,17,${alpha})`;

      c.fillRect(x, y, size, size);
    }

    // Sparse craquelure.
    c.strokeStyle = "rgba(33,27,20,0.105)";
    c.lineWidth = 0.55;

    for (let i = 0; i < 110; i++) {
      let x = random() * w;
      let y = random() * h;

      c.beginPath();
      c.moveTo(x, y);

      const pieces = 2 + Math.floor(random() * 4);
      for (let j = 0; j < pieces; j++) {
        x += (random() - 0.5) * 14;
        y += random() * 8 + 2;
        c.lineTo(x, y);
      }

      c.stroke();
    }

    c.restore();

    // Warm varnish.
    c.fillStyle = "rgba(125,88,38,0.055)";
    c.fillRect(0, 0, w, h);
  }

  function addPolyline(points, width, category) {
    for (let segment = 0; segment < points.length - 1; segment++) {
      const a = points[segment];
      const b = points[segment + 1];
      const distance = Math.hypot(b.x - a.x, b.y - a.y);
      const count = Math.max(1, Math.ceil(distance / 3.5));

      for (let i = 0; i <= count; i++) {

        trajectory.push({
          x: a.x + (b.x - a.x) * t,
          y: a.y + (b.y - a.y) * t,
          width,
          category,
          jump: segment === 0 && i === 0
        });
      }
    }
  }

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Canvas test</title>
  <style>
    body {
      color: white;
      background: #181818;
      font-family: sans-serif;
    }

    canvas {
      display: block;
      border: 2px solid white;
    }
  </style>
</head>
<body>
  &lt;canvas id="test" width="500" height="300"&gt;
    Canvas fallback text
  </canvas>

  <p id="status">Testing…</p>

  <script>
    const canvas = document.getElementById("test");
    const context = canvas.getContext("2d");
    const status = document.getElementById("status");

    if (!context) {
      status.textContent = "Canvas exists, but no 2D context could be created.";
    } else {
      const gradient = context.createLinearGradient(0, 0, 500, 300);
      gradient.addColorStop(0, "#2563eb");
      gradient.addColorStop(1, "#e11d48");

      context.fillStyle = gradient;
      context.fillRect(0, 0, 500, 300);

      context.fillStyle = "white";
      context.font = "bold 32px sans-serif";
      context.fillText("Canvas works in Brave", 55, 160);

      status.textContent = "Success: the Canvas 2D context is working.";
    }
  </script>
</body>
</html>
